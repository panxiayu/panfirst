<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工管理 - 兴利汽车模具</title>
    <link rel="stylesheet" href="css/linear.css">
    <link rel="stylesheet" href="css/theme.css">
    <script src="js/sortable.min.js"></script>
    <script src="js/api.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.2) transparent; }
        html::-webkit-scrollbar { width: 6px; }
        html::-webkit-scrollbar-track { background: transparent; border-radius: 3px; }
        html::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
        html::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.35); }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, var(--bg-page) 0%, var(--bg-surface) 50%, var(--bg-page) 100%); color: var(--text-primary); min-height: 100vh; }
        .container { width: 100% !important; max-width: 1600px !important; margin: 0 auto; padding: 20px 24px; box-sizing: border-box; overflow-x: auto; }

        /* 顶部工具栏 */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; width: 100%; box-sizing: border-box; }
        .toolbar-left { display: flex; align-items: center; gap: 12px; }
        .toolbar-right { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: flex-end; }
        .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: var(--text-primary); }

        /* 按钮 */
        .btn { padding: 8px 14px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: all 0.2s; }
        .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%); color: white; box-shadow: 0 3px 10px rgba(59,130,246,0.3); }
        .btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--white); border-color: var(--border-dark); }
        .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); color: white; box-shadow: 0 3px 10px rgba(220,38,38,0.3); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        /* 表格 */
        .table-container { width: 100%; background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); box-sizing: border-box; overflow-x: auto; overflow-y: visible; margin-top: 15px; margin-bottom: 10px; }
        .table-container { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.2) transparent; }
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-track { background: transparent; border-radius: 3px; }
        .table-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.35); }
        .table-container::-webkit-scrollbar-corner { background: transparent; }
        .table-scroll-inner { overflow-x: auto; overflow-y: auto; min-height: 400px; height: calc(100vh - 140px); display: block; padding-bottom: 10px; box-sizing: border-box; }
        .table-scroll-inner { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.2) transparent; }
        .table-scroll-inner::-webkit-scrollbar { height: 6px; width: 6px; }
        .table-scroll-inner::-webkit-scrollbar-track { background: transparent; border-radius: 3px; }
        .table-scroll-inner::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
        .table-scroll-inner::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.35); }
        .table-scroll-inner::-webkit-scrollbar-corner { background: transparent; }
        table { width: 100%; table-layout: fixed; border-collapse: collapse; }
        .btn-col { background: linear-gradient(135deg, #7FCEF7 0%, #5BB8E0 50%, #A8B0D0 100%); color: #fff; font-weight: 600; box-shadow: 0 4px 16px rgba(59,130,246,0.3); }
        .btn-col:hover { background: linear-gradient(135deg, #5BB8E0 0%, #4AA8D0 50%, #8A9AB0 100%); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59,130,246,0.4); }
        /* 冻结列样式 - 工号姓名始终在最左边 */
        thead { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 13; }
        th { padding: 4px 6px; text-align: center !important; font-weight: 700; color: var(--text-primary); font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid var(--border); white-space: nowrap; background: rgba(255,255,255,0.98); vertical-align: middle !important; height: 34px; box-sizing: border-box; position: relative; z-index: 5; }
        td { padding: 3px 6px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-primary); text-align: center !important; background: rgba(255,255,255,0.98); vertical-align: middle !important; height: 26px; box-sizing: border-box; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        tbody tr:last-child td { border-bottom: none; }
        tbody { min-height: 200px; }
        /* 冻结列 - 序号工号姓名固定，z-index低于普通th */
        th[data-key="serial"], td[data-key="serial"] { position: sticky; left: 0; z-index: 12; background: rgba(255,255,255,0.98); width: 60px; min-width: 60px; }
        th[data-key="employee_id"], td[data-key="employee_id"] { position: sticky; left: 60px; z-index: 12; background: rgba(255,255,255,0.98); width: 70px; min-width: 70px; }
        th[data-key="name"], td[data-key="name"] { position: sticky; left: 130px; z-index: 12; background: rgba(255,255,255,0.98); width: 70px; min-width: 70px; }
        thead { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 13; }
        /* 隐藏列完全不显示 */
        th[style*="display: none"], td[style*="display: none"] { display: none !important; }
        /* 状态列完全隐藏 */
        th[data-key="status"], td[data-key="status"] { display: none; }
        /* 电话列向右偏移，避免档住性别的统计 */
        th[data-key="phone"], td[data-key="phone"] { padding-left: 4px; }
        tbody tr td:first-child { text-align: center; }
        tbody tr td:first-child .checkbox-cell { display: block; margin: 0 auto; }
        tbody tr:hover td { background: var(--bg-hover); }
        tbody tr.not-in-sync-row td { color: var(--danger) !important; background: rgba(220, 38, 38, 0.05); }
        .clickable-link { cursor: pointer; color: var(--text-primary); text-decoration: none; font-weight: 500; display: inline-block; text-align: center; }
        .clickable-link:hover { text-decoration: underline; color: var(--accent); }
        .checkbox-cell { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; }

        /* 状态提示 */
        .loading, .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }
        .empty-state { padding: 60px 20px; }
        .info-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-value { font-size: 13px; color: var(--text-primary); padding: 6px 10px; background: var(--bg-input); border-radius: var(--radius); border: 1px solid var(--border); min-height: 32px; display: flex; align-items: center; }

        /* 模态框 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(30,58,138,0.4); backdrop-filter: blur(20px); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-box { background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px; width: 90%; max-width: 400px; box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.5); animation: modalIn 0.25s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text-primary); }
        .modal-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

        /* 表单项 */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: var(--text-secondary); font-size: 12px; }
        .form-control { width: 100%; padding: 10px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; color: var(--text-primary); box-sizing: border-box; transition: all 0.2s; }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); background: var(--white); }
        .form-control::placeholder { color: var(--text-muted); }
        select.form-control { background: var(--bg-input); }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }

        /* 显示列下拉 */
        .column-dropdown label { display: flex; align-items: center; gap: 6px; padding: 5px 4px; cursor: pointer; font-size: 12px; color: var(--text-primary); }
        .column-dropdown label:hover { color: var(--accent); }
        .column-dropdown input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px; margin: 0; padding: 0; vertical-align: middle; }
        .column-dropdown { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.2) transparent; overflow-x: hidden; }
        .dropdown-wrapper { position: relative; display: inline-block; }
        .dropdown-wrapper .column-dropdown { visibility: hidden; opacity: 0; transform: translateY(-8px); transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none; }
        .dropdown-wrapper.open .column-dropdown { visibility: visible; opacity: 1; transform: translateY(0); pointer-events: auto; }
        .column-dropdown::-webkit-scrollbar { width: 6px; height: 6px; }
        .column-dropdown::-webkit-scrollbar-track { background: transparent; border-radius: 3px; }
        .column-dropdown::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
        .column-dropdown::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.35); }
        .column-dropdown::-webkit-scrollbar-corner { background: transparent; }
        #columnCheckboxes::-webkit-scrollbar { width: 6px; }
        #columnCheckboxes::-webkit-scrollbar-track { background: transparent; border-radius: 3px; }
        #columnCheckboxes::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
        #columnCheckboxes::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.35); }
        #columnCheckboxes { display: flex; flex-direction: column; flex-wrap: nowrap; }
        .column-drag-handle { cursor: move; margin-right: 4px; color: var(--text-muted); font-size: 10px; }
        th.dragging {
            transform: translateY(-8px) scale(0.88);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border-radius: 12px;
            z-index: 100;
            position: relative;
            background: white;
        }
        th.drag-over {
            background: rgba(59, 130, 246, 0.15);
            border-radius: 12px;
            box-shadow: 0 0 0 2px var(--accent);
        }
        th { transition: none; }

        /* Sortable.js 拖拽样式 */
        .sortable-ghost {
            opacity: 0.4;
            background: rgba(59, 130, 246, 0.15);
            transform: scale(0.5);
            border-radius: 8px;
        }
        .sortable-drag {
            border-radius: 12px !important;
            border: 0.5px solid rgba(0,0,0,0.06) !important;
            opacity: 1 !important;
            background: white !important;
        }
        #staffHeaderRow th.is-dragging {
            transform: scale(0.5);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border-radius: 8px;
            background: white;
            opacity: 1;
            position: relative;
            z-index: 9999;
        }
        th { transition: none; }

        /* 卡片列表 */
        .card-list { display: flex; flex-direction: column; gap: 8px; }
        .staff-card { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 0; transition: all 0.2s ease; cursor: pointer; }
        .staff-card:hover { border-color: var(--border-dark); box-shadow: var(--shadow); transform: translateY(-1px); }
        .staff-card.selected { border-color: var(--accent); background: var(--bg-hover); }
        .staff-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .staff-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
        .staff-name { font-weight: 600; font-size: 14px; color: var(--text-primary); }
        .staff-meta { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .staff-field { display: flex; align-items: center; gap: 4px; }
        .staff-field-label { color: var(--text-muted); }
        .staff-actions { display: flex; gap: 8px; }
        .staff-card .checkbox-cell { width: 18px; height: 18px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* 筛选下拉 - 表头筛选（全局容器） */
        .header-filter-dropdown { background: white; border: 1px solid #d1d5db; border-radius: 4px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); min-width: 235px; max-height: 400px; overflow: hidden; }
        .header-filter-dropdown .th-dropdown-header { display: flex; align-items: center; padding: 6px 8px; border-bottom: 1px solid #e5e7eb; gap: 8px; background: #f9fafb; }
        .header-filter-dropdown .th-dropdown-search { padding: 4px 8px; border-bottom: 1px solid #e5e7eb; }
        .header-filter-dropdown .th-dropdown-search input { width: 100%; padding: 4px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; box-sizing: border-box; background: var(--bg-input); color: var(--text-primary); }
        .header-filter-dropdown .th-dropdown-search input:focus { outline: none; border-color: var(--accent); }
        .header-filter-dropdown .th-select-all { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; color: #374151; flex-shrink: 0; }
        .header-filter-dropdown .th-select-all input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px; margin: 0; }
        .header-filter-dropdown .th-select-all:hover { color: #1f2937; }
        .header-filter-dropdown .th-dropdown-list { padding: 4px 0; max-height: 260px; overflow-y: auto; }
        .header-filter-dropdown .th-dropdown-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; cursor: pointer; font-size: 12px; color: #374151; position: relative; }
        .header-filter-dropdown .th-dropdown-item:hover { background: #f3f4f6; }
        .header-filter-dropdown .th-dropdown-item:hover input[type="checkbox"] { accent-color: var(--accent); }
        .header-filter-dropdown .th-dropdown-item:hover .single-select-btn { display: block !important; opacity: 1 !important; }
        .header-filter-dropdown .th-dropdown-item .single-select-btn { display: none; opacity: 0; }
        .header-filter-dropdown .th-dropdown-item .single-select-btn:hover { background: var(--success); border-color: var(--success); }
        .header-filter-dropdown .th-dropdown-item input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px; flex-shrink: 0; margin: 0; position: relative; z-index: 2; }
        .header-filter-dropdown .th-dropdown-sort { display: flex; align-items: center; padding: 3px 8px; gap: 4px; }
        .header-filter-dropdown .th-dropdown-sort button { flex: 1; padding: 2px 0; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-input); color: var(--text-primary); font-size: 10px; cursor: pointer; }
        .header-filter-dropdown .th-dropdown-sort button:hover { background: var(--bg-hover); border-color: var(--accent); color: var(--accent); }
        .header-filter-dropdown .th-item-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .header-filter-dropdown .th-dropdown-date { padding: 6px 8px; }
        .header-filter-dropdown .th-dropdown-manual { background: white; border: none !important; box-shadow: none !important; }
        .header-filter-dropdown .th-dropdown-manual input { background: white; border-color: var(--border); box-shadow: none; }
        .header-filter-dropdown .th-dropdown-date input { width: 100%; padding: 5px 6px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 11px; background: var(--bg-input); color: var(--text-primary); }
        .header-filter-dropdown .th-dropdown-date input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
        .header-filter-dropdown .th-dropdown-date-row { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
        .header-filter-dropdown .th-dropdown-date-row span { color: var(--text-muted); font-size: 10px; }
        /* 表头筛选按钮 */
        .th-filter-btn { cursor: pointer; background: none; border: none; padding: 0; font: inherit; color: inherit; display: inline-block; text-align: center; margin: 0 auto; }
        .th-filter-btn { display: inline-flex; align-items: center; justify-content: center; gap: 2px; color: var(--text-primary); }
        .th-filter-btn-text { display: inline-flex; align-items: center; text-align: center; }
        .th-filter-btn:hover { color: var(--accent); }
        .th-filter-btn.th-filter-btn-active { color: var(--success); }
        .th-filter-btn.th-filter-btn-active:hover { color: var(--success); }
        .th-filter-icon { font-size: 8px; display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; margin-top: -1px; margin-left: 0.5px; }
        .th-filter-icon svg { width: 11px; height: 11px; }
        .th-filter-count { background: var(--accent); color: white; border-radius: 8px; padding: 0 4px; font-size: 8px; display: inline-flex; align-items: center; justify-content: center; height: 14px; line-height: 14px; }
        .th-filter-count { background: var(--accent); color: white; border-radius: 8px; padding: 0 4px; font-size: 8px; margin-left: 2px; height: 14px; line-height: 14px; }
        /* 下拉滚动条 */
        .header-filter-dropdown .th-dropdown-list::-webkit-scrollbar { width: 5px; }
        .header-filter-dropdown .th-dropdown-list::-webkit-scrollbar-track { background: transparent; }
        .header-filter-dropdown .th-dropdown-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
        .header-filter-dropdown .th-dropdown-list::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.35); }
        /* 复选框不确定状态 */
        input[type="checkbox"]:indeterminate { background: var(--text-secondary); }
        /* 入职日期分级下拉样式 */
        .header-filter-dropdown .date-row:hover { background: #e5e7eb !important; }
        .header-filter-dropdown .date-row:hover .single-select-btn { display: block !important; opacity: 1 !important; }
        .header-filter-dropdown .date-row .single-select-btn { display: none; opacity: 0; }
        .header-filter-dropdown .date-row .single-select-btn:hover { background: var(--success); border-color: var(--success); }
        .header-filter-dropdown .date-day-item:hover { background: #f3f4f6; }
        .header-filter-dropdown .date-day-item:hover .single-select-btn { display: block !important; opacity: 1 !important; }
        .header-filter-dropdown .date-day-item .single-select-btn { display: none; opacity: 0; }
        .header-filter-dropdown .date-day-item .single-select-btn:hover { background: var(--success); border-color: var(--success); }
        .header-filter-dropdown .date-row input[type="checkbox"], .header-filter-dropdown .date-day-item input[type="checkbox"] { cursor: pointer; }
        .header-filter-dropdown .expand-icon { transition: transform 0.2s; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <div class="toolbar-left">
                <span class="page-title">员工管理</span>
            </div>
            <div class="toolbar-right" style="position:relative;">
                <span id="syncTimeDisplay" style="font-size:12px;color:var(--text-muted);margin-right:12px;font-weight:400;"></span>
                <button class="btn btn-secondary btn-sm" onclick="goBack()">返回</button>
                <button class="btn btn-secondary btn-sm" onclick="clearAllFilters()">取消筛选</button>
                <button class="btn btn-secondary btn-sm" onclick="showSyncModal()">同步</button>
                <button class="btn btn-secondary btn-sm" onclick="showImportModal()" style="display:none;">导入</button>
                <button class="btn btn-primary btn-sm" onclick="openAddModal()" style="display:none;">+ 添加</button>
                <button class="btn btn-danger btn-sm" onclick="batchDelete()" style="display:none;">删除</button>
                <div class="dropdown-wrapper" id="colDropdown">
                    <button class="btn btn-sm btn-col" id="colBtn">☰ 显示列</button>
                    <div id="columnMenu" class="column-dropdown" style="position:absolute; right:0; top:100%; margin-top:5px; background: rgba(255,255,255,0.9); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); z-index: 100; min-width: 180px; max-height: 400px; display: flex; flex-direction: column; transition: max-height 0.3s ease, min-width 0.3s ease;">
                        <div style="display:flex; align-items:center; gap:6px; padding:6px 6px 6px 10px; border-bottom:1px solid var(--border); flex-shrink:0;">
                            <input type="checkbox" id="selectAllColumns" onchange="toggleAllColumns(this.checked)" style="accent-color:var(--accent); width:14px; height:14px; margin:0; padding:0; vertical-align:middle;">
                            <span style="color:var(--text-muted); font-size:11px; flex-shrink:0;">☰</span>
                            <span style="font-size:12px; color:var(--text-primary); flex-shrink:0;">全选</span>
                            <button type="button" id="expandAllColsBtn" onclick="toggleShowAllColumns()" style="margin-left:auto; padding:3px 8px; border:1px solid var(--border); border-radius:4px; background:var(--bg-input); color:var(--text-primary); font-size:10px; cursor:pointer;">展开全部</button>
                        </div>
                        <div id="columnCheckboxes" style="flex:1; overflow-y: auto; max-height: 340px; padding-left: 6px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 搜索栏 -->
        <div id="searchBar" style="margin: 12px 0; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; background: var(--bg-page); padding: 4px 0;">

    <!-- 表头筛选下拉容器（挂载到body避免sticky定位问题） -->
    <div id="headerFilterDropdown" class="header-filter-dropdown" style="position:absolute; top:0; left:0; z-index:9999; display:none;"></div>

    <script>
        const API_URL = window.location.origin + '/api';
        let currentStaffData = [];
        let loadStaffController = null; // 用于取消上一个请求

        // 列配置是否已从API数据同步过（持久化到localStorage）
        function isColumnsSynced() {
            return localStorage.getItem('columnsSynced') === 'true';
        }
        function setColumnsSynced(val) {
            localStorage.setItem('columnsSynced', val ? 'true' : 'false');
        }

        // 列配置
        const COLUMNS = [
            { key: 'serial', label: '序号', visible: true, sortable: true, width: '60px' },
            { key: 'employee_id', label: '工号', visible: true, sortable: true, width: '70px' },
            { key: 'name', label: '姓名', visible: true, sortable: true, width: '70px' },
            { key: 'gender', label: '性别', visible: true, sortable: false, width: '58px' },
            { key: 'phone', label: '电话', visible: true, sortable: false, width: '110px' },
            { key: 'department', label: '部门', visible: true, sortable: true, width: '90px' },
            { key: 'team', label: '班组', visible: true, sortable: false, width: '80px' },
            { key: 'position', label: '职位', visible: true, sortable: false, width: '80px' },
            { key: 'hire_date', label: '入职日期', visible: true, sortable: true, width: '100px' },
            { key: 'id_card', label: '身份证号', visible: false, sortable: false, width: '160px' },
            { key: 'birthday', label: '出生年月', visible: false, sortable: false, width: '100px' },
            { key: 'nationality', label: '民族', visible: false, sortable: false, width: '70px' },
            { key: 'household', label: '户口性质', visible: false, sortable: false, width: '80px' },
            { key: 'address', label: '家庭住址', visible: false, sortable: false, width: '200px' },
            { key: 'current_address', label: '现居住地址', visible: false, sortable: false, width: '200px' },
            { key: 'education', label: '学历', visible: false, sortable: false, width: '60px' },
            { key: 'major', label: '专业', visible: false, sortable: false, width: '100px' },
            { key: 'graduate_school', label: '毕业院校', visible: false, sortable: false, width: '120px' },
            { key: 'contract_signed', label: '合同签订', visible: false, sortable: false, width: '80px' },
            { key: 'contract_period', label: '合同期限', visible: false, sortable: false, width: '80px' },
            { key: 'category', label: '类别', visible: false, sortable: false, width: '70px' },
            { key: 'bank_account', label: '工资卡账号', visible: false, sortable: false, width: '160px' },
            { key: 'bank_name', label: '开户行', visible: false, sortable: false, width: '120px' },
            { key: 'emergency_contact', label: '紧急联系人', visible: false, sortable: false, width: '80px' },
            { key: 'emergency_relation', label: '与本人关系', visible: false, sortable: false, width: '80px' },
            { key: 'emergency_phone', label: '紧急联系电话', visible: false, sortable: false, width: '110px' },
            { key: 'status', label: '状态', visible: false, sortable: true, width: '60px' }
        ];

        // 从后端加载用户列配置（失败时回退到localStorage）
        async function loadColumnConfig() {
            // 先从localStorage快速恢复（同步操作，用户立即看到效果）
            let localData = null;
            try {
                const savedLocal = localStorage.getItem('staffColumns');
                console.log('[DEBUG] loadColumnConfig localStorage raw:', savedLocal);
                if (savedLocal) {
                    localData = JSON.parse(savedLocal);
                    console.log('[DEBUG] loadColumnConfig localData:', JSON.stringify(localData));
                    if (Array.isArray(localData)) {
                        // 兼容旧格式：按索引应用
                        COLUMNS.forEach((col, i) => {
                            if (localData[i] !== undefined) col.visible = localData[i];
                        });
                    } else if (typeof localData === 'object') {
                        // 新格式：按key应用
                        COLUMNS.forEach(col => {
                            if (localData[col.key] !== undefined) col.visible = localData[col.key];
                        });
                        // 恢复列顺序
                        if (localData._order && Array.isArray(localData._order)) {
                            const orderMap = {};
                            COLUMNS.forEach((col, i) => { orderMap[col.key] = i; });
                            const sorted = localData._order.filter(k => orderMap[k] !== undefined);
                            // 把不在order中的列按原顺序加到末尾
                            COLUMNS.forEach(col => {
                                if (!localData._order.includes(col.key)) sorted.push(col.key);
                            });
                            // 根据排序重新排列COLUMNS（只保留原始定义的列）
                            COLUMNS.length = 0;
                            const masterColumns = [
                                { key: 'serial', label: '序号', visible: true, sortable: true, width: '60px' },
                                { key: 'employee_id', label: '工号', visible: true, sortable: true, width: '70px' },
                                { key: 'name', label: '姓名', visible: true, sortable: true, width: '70px' },
                                { key: 'gender', label: '性别', visible: true, sortable: false, width: '58px' },
                                { key: 'phone', label: '电话', visible: true, sortable: false, width: '110px' },
                                { key: 'department', label: '部门', visible: true, sortable: true, width: '90px' },
                                { key: 'team', label: '班组', visible: true, sortable: false, width: '80px' },
                                { key: 'position', label: '职位', visible: true, sortable: false, width: '80px' },
                                { key: 'hire_date', label: '入职日期', visible: true, sortable: true, width: '100px' },
                                { key: 'id_card', label: '身份证号', visible: false, sortable: false, width: '160px' },
                                { key: 'birthday', label: '出生年月', visible: false, sortable: false, width: '100px' },
                                { key: 'nationality', label: '民族', visible: false, sortable: false, width: '70px' },
                                { key: 'household', label: '户口性质', visible: false, sortable: false, width: '80px' },
                                { key: 'address', label: '家庭住址', visible: false, sortable: false, width: '200px' },
                                { key: 'current_address', label: '现居住地址', visible: false, sortable: false, width: '200px' },
                                { key: 'education', label: '学历', visible: false, sortable: false, width: '60px' },
                                { key: 'major', label: '专业', visible: false, sortable: false, width: '100px' },
                                { key: 'graduate_school', label: '毕业院校', visible: false, sortable: false, width: '120px' },
                                { key: 'contract_signed', label: '合同签订', visible: false, sortable: false, width: '80px' },
                                { key: 'contract_period', label: '合同期限', visible: false, sortable: false, width: '80px' },
                                { key: 'category', label: '类别', visible: false, sortable: false, width: '70px' },
                                { key: 'bank_account', label: '工资卡账号', visible: false, sortable: false, width: '160px' },
                                { key: 'bank_name', label: '开户行', visible: false, sortable: false, width: '120px' },
                                { key: 'emergency_contact', label: '紧急联系人', visible: false, sortable: false, width: '80px' },
                                { key: 'emergency_relation', label: '与本人关系', visible: false, sortable: false, width: '80px' },
                                { key: 'emergency_phone', label: '紧急联系电话', visible: false, sortable: false, width: '110px' },
                                { key: 'status', label: '状态', visible: false, sortable: true, width: '60px' }
                            ];
                            masterColumns.forEach(col => { COLUMNS.push(col); });
                            // 应用保存的可见性
                            masterColumns.forEach(col => {
                                if (localData[col.key] !== undefined) {
                                    const found = COLUMNS.find(c => c.key === col.key);
                                    if (found) found.visible = localData[col.key];
                                }
                            });
                        }
                    }
                    // 始终隐藏状态列
                    COLUMNS.forEach(col => { if (col.key === 'status') col.visible = false; });
                    console.log('[DEBUG] After localStorage restore, COLUMNS:', JSON.stringify(COLUMNS.map(c => ({k:c.key,v:c.visible}))));
                }
            } catch(e) {
                console.warn('localStorage恢复失败:', e);
            }
            // 异步从后端加载最新配置（只有localStorage为空时才使用后端数据）
            try {
                const res = await fetch(`${API_URL}/staff/column-config?key=staff_columns`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const json = await res.json();
                console.log('[DEBUG] loadColumnConfig API response:', JSON.stringify(json));
                // 只有当localStorage没有数据时才使用后端数据
                if (json && json.code === 0 && json.data && localData === null) {
                    const cfg = json.data;
                    if (Array.isArray(cfg)) {
                        COLUMNS.forEach((col, i) => {
                            if (cfg[i] !== undefined) col.visible = cfg[i];
                        });
                    } else if (typeof cfg === 'object') {
                        COLUMNS.forEach(col => {
                            if (cfg[col.key] !== undefined) col.visible = cfg[col.key];
                        });
                        // 不再根据API的_order重新排序，保持COLUMNS定义顺序
                    }
                    // 始终隐藏状态列
                    COLUMNS.forEach(col => { if (col.key === 'status') col.visible = false; });
                    // 同步到localStorage
                    const backupData = {};
                    COLUMNS.forEach(col => { backupData[col.key] = col.visible; });
                    backupData._order = COLUMNS.map(c => c.key);
                    localStorage.setItem('staffColumns', JSON.stringify(backupData));
                }
            } catch(e) {
                console.warn('从后端加载列配置失败，继续使用localStorage:', e);
            }
        }

        // 保存列配置到后端（同时保存到localStorage作为后备）
        async function saveColumnConfig() {
            // 使用对象格式保存（key -> visible），避免顺序问题
            const data = {};
            COLUMNS.forEach(col => {
                data[col.key] = col.visible;
            });
            // 保存列顺序
            const order = COLUMNS.map(c => c.key);
            data._order = order;
            // 先保存到localStorage
            localStorage.setItem('staffColumns', JSON.stringify(data));
            // 尝试保存到后端
            try {
                const res = await fetch(`${API_URL}/staff/column-config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ key: 'staff_columns', data })
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const json = await res.json();
                if (json && json.code === 0) {
                    showToast('配置已保存');
                } else {
                    showToast('保存失败: ' + (json?.msg || '未知错误'), 'error');
                }
            } catch(e) {
                showToast('保存失败: 网络错误', 'error');
            }
        }

        // 显示上次同步时间
        async function showSyncTime() {
            const el = document.getElementById('syncTimeDisplay');
            if (!el) return;
            try {
                const token = getToken();
                const res = await fetch(`${API_URL}/staff/sync-time`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.code === 0 && data.data) {
                    const d = new Date(data.data);
                    const month = d.getMonth() + 1;
                    const day = d.getDate();
                    const hour = String(d.getHours()).padStart(2, '0');
                    const minute = String(d.getMinutes()).padStart(2, '0');
                    el.textContent = `上次同步: ${month}月${day}日 ${hour}:${minute}`;
                } else {
                    el.textContent = '';
                }
            } catch {
                el.textContent = '';
            }
        }
        let toastTimeout = null;
        function showToast(msg, type = 'success') {
            let toast = document.getElementById('saveToast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'saveToast';
                toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:6px;z-index:9999;font-size:12px;transition:opacity 0.2s, transform 0.2s;opacity:0;transform:translateX(-50%) translateY(-10px);backdrop-filter:blur(10px);background:rgba(255,255,255,0.7);box-shadow:0 2px 12px rgba(0,0,0,0.08);color:#333';
                document.body.appendChild(toast);
            }
            // 清除之前的timeout
            if (toastTimeout) clearTimeout(toastTimeout);
            toast.textContent = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            toastTimeout = setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(-10px)';
            }, 1000);
        }

        // 切换列显示/隐藏
        function toggleColumn(key) {
            const col = COLUMNS.find(c => c.key === key);
            if (col) {
                col.visible = !col.visible;
                saveColumnConfig().catch(()=>{});
                updateTableColumns();
                updateColumnCheckboxes();
            }
        }

        // 更新复选框状态
        let draggedItem = null;
        let showAllColsExpanded = false;

        // 展开/收起所有列
        function toggleShowAllColumns() {
            showAllColsExpanded = !showAllColsExpanded;
            const menu = document.getElementById('columnMenu');
            const items = document.getElementById('columnCheckboxes');
            const btn = document.getElementById('expandAllColsBtn');
            if (showAllColsExpanded) {
                menu.style.maxHeight = '2200px';
                menu.style.overflow = 'hidden';
                menu.style.minWidth = '380px';
                items.style.maxHeight = 'none';
                items.style.display = 'block';
                items.style.columnCount = '2';
                items.style.columnGap = '8px';
                if (btn) btn.textContent = '收起';
            } else {
                menu.style.maxHeight = '400px';
                menu.style.overflow = 'hidden';
                menu.style.minWidth = '180px';
                items.style.maxHeight = '340px';
                items.style.display = 'flex';
                items.style.columnCount = 'unset';
                if (btn) btn.textContent = '展开全部';
            }
        }

        function updateColumnCheckboxes() {
            const container = document.getElementById('columnCheckboxes');
            if (!container) return;
            const cols = COLUMNS.filter(c => c.key !== 'status');
            // 所有列都可以调整
            const otherCols = cols;
            const allOtherVisible = otherCols.length > 0 && otherCols.every(c => c.visible);
            const selectAll = document.getElementById('selectAllColumns');
            if (selectAll) selectAll.checked = allOtherVisible;
            container.innerHTML = cols.map((col, idx) => {
                const isLocked = ['serial', 'employee_id', 'name'].includes(col.key);
                const isDraggable = !isLocked;
                return `<div class="col-item" draggable="${isDraggable}" data-key="${col.key}" style="display:flex; align-items:center; gap:6px; padding:6px 4px; cursor:${isLocked ? 'not-allowed' : 'move'}; user-select:none; box-sizing:border-box; opacity:${isLocked ? '0.5' : '1'};">
                    <input type="checkbox" ${col.visible ? 'checked' : ''} ${isLocked ? 'disabled' : ''} onchange="toggleColumn('${col.key}')" style="accent-color:var(--accent); flex-shrink:0; width:14px; height:14px; margin:0; padding:0; vertical-align:middle;">
                    <span style="color:var(--text-muted); font-size:11px; flex-shrink:0; line-height:1;">☰</span>
                    <span style="font-size:12px; flex-shrink:0; line-height:1; color:${isLocked ? 'var(--text-muted)' : 'var(--text-primary)'};">${col.label}</span>
                </div>`;
            }).join('');
            
            // Add drag events
            container.querySelectorAll('.col-item').forEach(item => {
                item.addEventListener('dragstart', e => {
                    draggedItem = item;
                    item.style.opacity = '0.5';
                    e.dataTransfer.effectAllowed = 'move';
                });
                item.addEventListener('dragend', () => {
                    item.style.opacity = '1';
                    draggedItem = null;
                });
                item.addEventListener('dragover', e => {
                    e.preventDefault();
                    if (item !== draggedItem) {
                        item.style.borderTop = '2px solid var(--accent)';
                    }
                });
                item.addEventListener('dragleave', () => {
                    item.style.borderTop = '';
                });
                item.addEventListener('drop', e => {
                    e.preventDefault();
                    item.style.borderTop = '';
                    if (item === draggedItem) return;

                    const fromKey = draggedItem.dataset.key;
                    const toKey = item.dataset.key;

                    // 禁止将其他列拖到 serial, employee_id, name 之前
                    if (['serial', 'employee_id', 'name'].includes(toKey)) return;

                    const fromIdx = COLUMNS.findIndex(c => c.key === fromKey);
                    const toIdx = COLUMNS.findIndex(c => c.key === toKey);

                    // Reorder COLUMNS
                    const [moved] = COLUMNS.splice(fromIdx, 1);
                    COLUMNS.splice(toIdx, 0, moved);

                    saveColumnConfig().catch(()=>{});
                    // 只更新表头单元格位置，不重新渲染整个表头
                    updateHeaderOrder();
                    updateColumnCheckboxes();
                });
            });
        }

        // 全选/取消全选
        function toggleAllColumns(checked) {
            COLUMNS.forEach(col => {
                if (col.key !== 'status') {
                    // 取消全选时，保留序号、工号、姓名
                    if (checked || (col.key !== 'serial' && col.key !== 'employee_id' && col.key !== 'name')) {
                        col.visible = checked;
                    }
                }
            });
            saveColumnConfig().catch(()=>{});
            renderTableHeader();
            updateTableColumns();
            updateColumnCheckboxes();
        }

        // 只更新表头单元格顺序
        function updateHeaderOrder() {
            const row = document.getElementById('staffHeaderRow');
            const ths = Array.from(row.querySelectorAll('th'));
            // 按COLUMNS顺序重新排列TH
            ths.sort((a, b) => {
                const keyA = a.dataset.key;
                const keyB = b.dataset.key;
                const idxA = COLUMNS.findIndex(c => c.key === keyA);
                const idxB = COLUMNS.findIndex(c => c.key === keyB);
                return idxA - idxB;
            });
            ths.forEach(th => row.appendChild(th));

            // 同时更新表体行的TD顺序
            const tbody = document.getElementById('staffList');
            tbody.querySelectorAll('tr').forEach(tr => {
                const tds = Array.from(tr.querySelectorAll('td'));
                tds.sort((a, b) => {
                    const keyA = a.dataset.key;
                    const keyB = b.dataset.key;
                    const idxA = COLUMNS.findIndex(c => c.key === keyA);
                    const idxB = COLUMNS.findIndex(c => c.key === keyB);
                    return idxA - idxB;
                });
                tds.forEach(td => tr.appendChild(td));
            });
        }

        // 更新表格列显示
        function updateTableColumns() {
            // 检查是否有可见列
            const visibleCols = COLUMNS.filter(c => c.visible);
            const allHidden = visibleCols.length === 0;

            // 只更新现有表头单元格的显示状态（不重建）
            const headers = document.querySelectorAll('#staffHeaderRow th');
            headers.forEach(th => {
                const key = th.dataset.key;
                const col = COLUMNS.find(c => c.key === key);
                if (col) {
                    th.style.display = col.visible ? '' : 'none';
                }
            });

            const tbody = document.getElementById('staffList');

            if (allHidden) {
                // 所有列都隐藏，隐藏所有行，显示空消息
                tbody.querySelectorAll('tr').forEach(row => row.style.display = 'none');
                // 显示空消息行
                let emptyRow = tbody.querySelector('.empty-message-row');
                if (!emptyRow) {
                    emptyRow = document.createElement('tr');
                    emptyRow.className = 'empty-message-row';
                    emptyRow.innerHTML = `<td colspan="${COLUMNS.length}" style="text-align:center; padding:40px; color:var(--text-muted);">空</td>`;
                    tbody.appendChild(emptyRow);
                }
                emptyRow.style.display = '';
            } else {
                // 有可见列，重新渲染表格
                if (currentStaffData.length > 0) {
                    renderStaffTable(currentStaffData);
                                    }
                // 隐藏空消息行
                const emptyRow = tbody.querySelector('.empty-message-row');
                if (emptyRow) emptyRow.style.display = 'none';
            }
        }

        function renderTableHeader() {
            const thead = document.getElementById('staffThead');
            const row = document.getElementById('staffHeaderRow');
            const visibleNonCheckbox = COLUMNS.filter(c => c.visible);
            const allHidden = visibleNonCheckbox.length === 0;

            function getFilterIcon(key) {
                // 箭头颜色由父级按钮的 class 控制
                return `<span class="th-filter-icon">▼</span>`;
            }

            function getFilterCount(key) {
                return `<span class="th-filter-count" id="${key}Count" style="display:none;"></span>`;
            }

            function getSerialCount() {
                return `<span class="th-filter-count" id="serialCount"></span>`;
            }

            row.innerHTML = COLUMNS.map(col => {
                const isFrozen = false;
                // 所有数据列都可以筛选（除了 status）
                const isFilterable = col.key !== 'status';

                let thContent = col.label;
                // 序号列显示总数 - 无筛选箭头
                if (col.key === 'serial') {
                    thContent = `<span class="th-filter-btn-text">${col.label}${getSerialCount()}</span>`;
                } else if (isFilterable) {
                    const isFiltered = hasActiveFilter(col.key);
                    const btnClass = isFiltered ? 'th-filter-btn th-filter-btn-active' : 'th-filter-btn';
                    thContent = `<button type="button" class="${btnClass}" data-filter="${col.key}"><span class="th-filter-btn-text">${col.label}</span>${getFilterIcon(col.key)}</button>`;
                }

                return `<th data-key="${col.key}" class="${isFrozen ? 'frozen' : ''}" style="text-align:center; width:${col.width}; min-width:${col.width}; cursor:default; display:${col.visible ? '' : 'none'};">${thContent}</th>`;
            }).join('');

            // 设置序号统计数字
            const serialCountEl = row.querySelector('#serialCount');
            if (serialCountEl) {
                serialCountEl.textContent = currentStaffData.length;
                serialCountEl.style.display = 'inline-block';
            }

            initSortable();
            // 初始化表头筛选下拉
            initHeaderFilterDropdowns();
        }

        // 当前打开的下拉key
        let currentFilterKey = null;

        // 初始化表头筛选下拉
        function initHeaderFilterDropdowns() {
            // 绑定表头筛选按钮点击事件
            document.querySelectorAll('.th-filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const filterKey = btn.dataset.filter;
                    const dropdown = document.getElementById('headerFilterDropdown');

                    // 如果点击同一个按钮，关闭下拉
                    if (currentFilterKey === filterKey && dropdown.style.display === 'block') {
                        dropdown.style.display = 'none';
                        currentFilterKey = null;
                        return;
                    }

                    // 关闭下拉
                    dropdown.style.display = 'none';

                    // 设置当前下拉key
                    currentFilterKey = filterKey;

                    // 填充内容
                    populateHeaderFilterOptions(filterKey, dropdown);

                    // 计算并设置位置
                    const btnRect = btn.getBoundingClientRect();
                    dropdown.style.top = (btnRect.bottom + 4) + 'px';
                    dropdown.style.left = btnRect.left + 'px';

                    // 显示下拉
                    dropdown.style.display = 'block';
                });
            });

            // 点击其他地方关闭下拉
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.th-filter-btn') && !e.target.closest('#headerFilterDropdown')) {
                    const dropdown = document.getElementById('headerFilterDropdown');
                    if (dropdown) dropdown.style.display = 'none';
                    currentFilterKey = null;
                }
            });

            // 阻止下拉内部点击冒泡
            document.addEventListener('click', (e) => {
                if (e.target.closest('#headerFilterDropdown')) {
                    e.stopPropagation();
                }
            });
        }

        // 填充表头筛选下拉的选项
        function populateHeaderFilterOptions(key, dropdown) {
            // 入职日期 - Excel风格分级下拉（年展开→月→日）
            if (key === 'hire_date') {
                // 从数据中提取年月日分级结构（联动筛选 - 只显示匹配其他列筛选条件的数据）
                const yearMap = {};
                const filteredData = getFilteredDataForColumn('hire_date');
                filteredData.forEach(s => {
                    if (!s.hire_date) return;
                    const d = parseDate(s.hire_date);
                    if (!d) return;
                    const y = d.getFullYear();
                    const m = d.getMonth() + 1;
                    const day = d.getDate();
                    if (!yearMap[y]) yearMap[y] = { months: {}, _count: 0 };
                    if (!yearMap[y].months[m]) yearMap[y].months[m] = { days: {}, _count: 0 };
                    yearMap[y].months[m].days[day] = true;
                    yearMap[y]._count++;
                    yearMap[y].months[m]._count++;
                });

                // 读取已保存的筛选状态
                const savedFilterStr = localStorage.getItem('staffFilter_hire_date');
                let savedValues = null;
                if (savedFilterStr !== null) {
                    try {
                        savedValues = JSON.parse(savedFilterStr) || null;
                    } catch(e) { savedValues = null; }
                }

                const years = Object.keys(yearMap).sort((a, b) => b - a); // 降序

                // 如果有手动日期输入，根据日期范围计算哪些日期应该被选中
                const manualStart = localStorage.getItem('staffFilterHireDateManualStart');
                const manualEnd = localStorage.getItem('staffFilterHireDateManualEnd');
                if (manualStart || manualEnd) {
                    const startDate = manualStart ? parseFlexibleDate(manualStart) : null;
                    const endDate = manualEnd ? parseFlexibleDate(manualEnd, true) : null;
                    if (startDate || endDate) {
                        // 计算哪些日期在范围内
                        savedValues = [];
                        years.forEach(y => {
                            const yNum = parseInt(y);
                            Object.keys(yearMap[y].months).forEach(m => {
                                const mNum = parseInt(m);
                                Object.keys(yearMap[y].months[m].days).forEach(d => {
                                    const dNum = parseInt(d);
                                    const date = new Date(yNum, mNum - 1, dNum);
                                    const startOk = !startDate || date >= startDate;
                                    const endOk = !endDate || date <= endDate;
                                    if (startOk && endOk) {
                                        savedValues.push(y + '-' + m + '-' + d);
                                    }
                                });
                            });
                        });
                    }
                }

                // 生成分级HTML
                const allChecked = savedValues === null;
                const savedStart = localStorage.getItem('staffFilterHireDateManualStart') || '';
                const savedEnd = localStorage.getItem('staffFilterHireDateManualEnd') || '';
                let html = `<div class="th-dropdown-manual" style="padding:8px 10px;">
                    <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
                        <span style="font-size:11px; color:#6b7280; width:20px;">从</span>
                        <input type="text" id="hireDateManualStart" value="${savedStart}" placeholder="输入日期" onkeydown="if(event.key==='Enter')onHireDateManualChange()" style="flex:1; padding:4px 6px; font-size:11px; border:1px solid var(--border); border-radius:4px; background:white; color:var(--text-primary);">
                    </div>
                    <div style="display:flex; align-items:center; gap:6px;">
                        <span style="font-size:11px; color:#6b7280; width:20px;">到</span>
                        <input type="text" id="hireDateManualEnd" value="${savedEnd}" placeholder="输入日期" onkeydown="if(event.key==='Enter')onHireDateManualChange()" style="flex:1; padding:4px 6px; font-size:11px; border:1px solid var(--border); border-radius:4px; background:white; color:var(--text-primary);">
                    </div>
                </div>
                <div class="th-dropdown-sort">
                    <button onclick="sortColumn('${key}', 'asc')">升序 ↑</button>
                    <button onclick="sortColumn('${key}', 'desc')">降序 ↓</button>
                </div>
                <div class="th-dropdown-list" id="hireDateTree" style="max-height:200px; overflow-y:auto; padding:4px 0;">
                <div class="date-year-item" style="margin:1px 4px;">
                    <div class="date-row" style="display:flex; align-items:center; gap:6px; padding:5px 8px; cursor:pointer;">
                        <span style="width:14px;"></span>
                        <input type="checkbox" id="hire_dateAll" ${allChecked ? 'checked' : ''} onchange="toggleAllHireDate(this.checked)" style="accent-color:var(--accent); cursor:pointer; width:14px; height:14px;">
                        <span style="font-weight:600; font-size:12px; color:#374151;">全选</span>
                    </div>
                </div>`;

                years.forEach(y => {
                    const yearCount = yearMap[y]._count;
                    const yearChecked = savedValues === null || savedValues.some(v => String(v) === y || String(v).startsWith(y + '-'));
                    html += `<div class="date-year-item" style="margin:1px 4px;">
                        <div class="date-row" style="display:flex; align-items:center; gap:6px; padding:5px 8px; cursor:pointer;">
                            <span class="expand-icon" id="expandYear${y}" onclick="event.stopPropagation(); toggleYear(${y})" style="width:14px; text-align:center; font-size:10px; color:#6b7280; cursor:pointer;">▶</span>
                            <input type="checkbox" id="year${y}" onclick="event.stopPropagation();" onchange="onYearChange(${y}, this.checked)" ${yearChecked ? 'checked' : ''} style="accent-color:var(--accent); cursor:pointer; width:14px; height:14px;">
                            <span onclick="event.stopPropagation(); toggleYear(${y})" style="font-weight:600; font-size:12px; color:#374151; cursor:pointer;">${y}年</span>
                            <span style="color:#9ca3af; font-size:11px;">(${yearCount})</span>
                            <button onclick="event.stopPropagation(); singleSelectHireDate('${y}')" class="single-select-btn" style="padding:1px 4px; border:1px solid var(--success); border-radius:4px; background:var(--success); color:#fff; font-size:10px; cursor:pointer; margin-left:auto; flex-shrink:0;">仅筛选此项</button>
                        </div>
                        <div class="year-months" id="year${y}Months" style="display:none; margin-left:20px;">`;

                    const months = Object.keys(yearMap[y].months).sort((a, b) => a - b);
                    months.forEach(m => {
                        const monthCount = yearMap[y].months[m]._count;
                        const monthLabel = m + '月';
                        const monthChecked = savedValues === null || savedValues.some(v => v.startsWith(y + '-' + m + '-'));
                        html += `<div class="date-month-item" style="margin:1px 4px;">
                            <div class="date-row" style="display:flex; align-items:center; gap:6px; padding:4px 6px; cursor:pointer;">
                                <span class="expand-icon" id="expandMonth${y}${m}" onclick="event.stopPropagation(); toggleMonth(${y}, ${m})" style="width:14px; text-align:center; font-size:10px; color:#6b7280; cursor:pointer;">▶</span>
                                <input type="checkbox" id="month${y}${m}" onclick="event.stopPropagation();" onchange="onMonthChange(${y}, ${m}, this.checked)" ${monthChecked ? 'checked' : ''} style="accent-color:var(--accent); cursor:pointer; width:14px; height:14px;">
                                <span onclick="event.stopPropagation(); toggleMonth(${y}, ${m})" style="font-size:12px; color:#374151; cursor:pointer;">${monthLabel}</span>
                                <span style="color:#9ca3af; font-size:11px;">(${monthCount})</span>
                                <button onclick="event.stopPropagation(); singleSelectHireDate('${y}-${m}')" class="single-select-btn" style="padding:1px 4px; border:1px solid var(--success); border-radius:4px; background:var(--success); color:#fff; font-size:10px; cursor:pointer; margin-left:auto; flex-shrink:0;">仅筛选此项</button>
                            </div>
                            <div class="month-days" id="month${y}${m}Days" style="display:none; margin-left:38px;">`;

                        const days = Object.keys(yearMap[y].months[m].days).sort((a, b) => a - b);
                        days.forEach(d => {
                            const dayValue = String(y) + '-' + String(m) + '-' + String(d);
                            const dayChecked = savedValues === null || savedValues.includes(dayValue);
                            html += `<div class="date-day-item" style="display:flex; align-items:center; gap:4px; padding:3px 4px; cursor:pointer; border-radius:4px;">
                                <input type="checkbox" class="day-check" data-date="${dayValue}" id="day${y}${m}${d}" onclick="event.stopPropagation();" onchange="onDayChange('${dayValue}', this.checked)" ${dayChecked ? 'checked' : ''} style="accent-color:var(--accent); cursor:pointer; width:14px; height:14px;">
                                <span onclick="event.stopPropagation();" style="font-size:12px; color:#374151; cursor:pointer; flex-shrink:0;">${d}日</span>
                                <button onclick="event.stopPropagation(); singleSelectHireDate('${dayValue}')" class="single-select-btn" style="padding:1px 4px; border:1px solid var(--success); border-radius:4px; background:var(--success); color:#fff; font-size:10px; cursor:pointer; margin-left:auto; flex-shrink:0;">仅筛选此项</button>
                            </div>`;
                        });

                        html += `</div></div>`;
                    });

                    html += `</div></div>`;
                });

                if (years.length === 0) {
                    html += '<div style="padding:10px; text-align:center; color:#9ca3af; font-size:12px;">无日期数据</div>';
                }

                html += '</div>';
                dropdown.innerHTML = html;
                return;
            }

            // ========== 其他字段筛选 ==========

            // 其他字段：获取唯一值（联动筛选 - 根据其他列的筛选条件过滤）
            const filteredData = getFilteredDataForColumn(key);
            const valuesSet = new Set();
            filteredData.forEach(s => {
                if (s[key]) valuesSet.add(s[key]);
            });
            const allValues = [...valuesSet];
            if (!allValues || allValues.length === 0) {
                dropdown.innerHTML = '<div style="padding:10px;text-align:center;color:var(--text-muted);font-size:12px;">无数据</div>';
                return;
            }

            // 排序
            allValues.sort((a, b) => {
                if (typeof a === 'string') return a.localeCompare(b, 'zh-CN');
                return a - b;
            });

            // 读取已保存的筛选状态
            // null = 从未筛选过（默认全选），[] = 用户清空了所有选项
            const savedFilterStr = localStorage.getItem('staffFilter_' + key);
            let savedValues = null;
            if (savedFilterStr !== null) {
                try {
                    savedValues = JSON.parse(savedFilterStr) || [];
                } catch(e) {
                    savedValues = null;
                }
            }

            // 构建下拉HTML
            let html = `<div class="th-dropdown-header" style="justify-content:space-between;">
                <label class="th-select-all" style="display:flex; align-items:center; gap:6px;">
                    <input type="checkbox" id="${key}All">
                    <span>全选</span>
                </label>
                <input type="text" id="${key}Search" placeholder="搜索" style="flex:1; margin-left:8px; padding:4px 8px; border:1px solid var(--border); border-radius:4px; font-size:11px; background:var(--bg-input); color:var(--text-primary);">
            </div>
            <div class="th-dropdown-sort">
                <button onclick="sortColumn('${key}', 'asc')">升序 ↑</button>
                <button onclick="sortColumn('${key}', 'desc')">降序 ↓</button>
            </div>
            <div class="th-dropdown-list" id="${key}List">`;

            // 根据筛选结果自动勾选：如果savedValues为null，则勾选在filteredData中存在的值
            // 如果savedValues有值，则勾选savedValues中在filteredData里存在的值
            allValues.forEach(val => {
                const displayVal = val || '(空)';
                let isChecked;
                if (savedValues === null) {
                    // 从未筛选过，默认勾选所有在筛选结果中存在的值
                    isChecked = filteredData.some(s => s[key] === val);
                } else {
                    // 之前筛选过，只勾选之前筛选的值中在当前筛选结果里存在的
                    isChecked = savedValues.includes(val);
                }
                const checked = isChecked ? 'checked' : '';
                const encodedVal = encodeURIComponent(val == null ? '' : String(val));
                html += `<div class="th-dropdown-item">
                    <input type="checkbox" class="${key}-check" value="${val}" ${checked}>
                    <span class="th-item-text">${displayVal}</span>
                    <button onclick="event.stopPropagation(); singleSelect('${key}', '${encodedVal}')" class="single-select-btn" style="padding:1px 6px; border:1px solid var(--success); border-radius:4px; background:var(--success); color:#fff; font-size:10px; cursor:pointer; flex-shrink:0; margin-left:8px;">仅筛选此项</button>
                </div>`;
            });

            html += '</div>';
            dropdown.innerHTML = html;

            // 绑定搜索事件
            const searchInput = document.getElementById(key + 'Search');
            if (searchInput) {
                searchInput.addEventListener('input', function() {
                    const keyword = this.value.toLowerCase();
                    const items = listContainer.querySelectorAll('.th-dropdown-item');
                    items.forEach(item => {
                        const text = item.querySelector('.th-item-text').textContent.toLowerCase();
                        item.style.display = text.includes(keyword) ? 'flex' : 'none';
                    });
                });
            }

            // 绑定全选复选框事件
            const allCheckbox = document.getElementById(key + 'All');
            const listContainer = document.getElementById(key + 'List');
            const checkboxes = listContainer.querySelectorAll(`.${key}-check`);

            // 更新全选状态
            function updateAllState() {
                const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
                allCheckbox.checked = checkedCount === checkboxes.length;
                allCheckbox.indeterminate = checkedCount > 0 && checkedCount < checkboxes.length;
            }
            updateAllState();

            // 全选点击 - 直接应用筛选
            allCheckbox.addEventListener('change', function() {
                checkboxes.forEach(cb => cb.checked = this.checked);
                // 直接应用筛选
                const checkedValues = Array.from(checkboxes).filter(c => c.checked).map(c => c.value);
                if (checkedValues.length === checkboxes.length) {
                    localStorage.removeItem('staffFilter_' + key);
                } else {
                    localStorage.setItem('staffFilter_' + key, JSON.stringify(checkedValues));
                }
                applyHeaderFilter();
            });

            // 单个复选框点击 - 勾选包含，取消勾选则排除
            checkboxes.forEach(cb => {
                cb.addEventListener('change', (e) => {
                    e.stopPropagation();
                    const currentCheckboxes = listContainer.querySelectorAll(`.${key}-check`);
                    const checkedValues = Array.from(currentCheckboxes).filter(c => c.checked).map(c => c.value);
                    if (checkedValues.length === 0) {
                        // 没有任何勾选 → 排除全部（保存特殊标记）
                        localStorage.setItem('staffFilter_' + key, JSON.stringify([]));
                    } else {
                        // 正常保存勾选状态
                        localStorage.setItem('staffFilter_' + key, JSON.stringify(checkedValues));
                    }
                    updateAllState();
                    applyHeaderFilter();
                });
            });

        }

        // ========== 入职日期分级筛选函数（全局） ==========
        // 展开/折叠年
        function toggleYear(y) {
            const el = document.getElementById('year' + y + 'Months');
            const icon = document.getElementById('expandYear' + y);
            if (!el) return;
            const isHidden = el.style.display === 'none';
            el.style.display = isHidden ? 'block' : 'none';
            icon.textContent = isHidden ? '▼' : '▶';
        }

        // 展开/折叠月
        function toggleMonth(y, m) {
            const el = document.getElementById('month' + y + m + 'Days');
            const icon = document.getElementById('expandMonth' + y + m);
            if (!el) return;
            const isHidden = el.style.display === 'none';
            el.style.display = isHidden ? 'block' : 'none';
            icon.textContent = isHidden ? '▼' : '▶';
        }

        // 点击日行选中
        function toggleDay(dayValue, rowEl) {
            const checkbox = rowEl.querySelector('input[type="checkbox"]');
            checkbox.checked = !checkbox.checked;
            onDayChange(dayValue, checkbox.checked);
        }

        // 年复选框
        function onYearChange(y, checked) {
            const monthsDiv = document.getElementById('year' + y + 'Months');
            if (!monthsDiv) return;
            monthsDiv.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = checked);
            saveHireDateFilter();
        }

        // 月复选框
        function onMonthChange(y, m, checked) {
            const daysDiv = document.getElementById('month' + y + m + 'Days');
            if (!daysDiv) return;
            daysDiv.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = checked);
            saveHireDateFilter();
        }

        // 日复选框
        function onDayChange(dayValue, checked) {
            saveHireDateFilter();
        }

        // 全选/取消全选
        function toggleAllHireDate(checked) {
            if (checked) {
                // 勾选全选 - 清除筛选，显示所有
                document.querySelectorAll('#hireDateTree input[type="checkbox"]').forEach(cb => cb.checked = true);
                localStorage.removeItem('staffFilter_hire_date');
                // 清空手动输入
                document.getElementById('hireDateManualStart').value = '';
                document.getElementById('hireDateManualEnd').value = '';
                localStorage.removeItem('staffFilterHireDateManualStart');
                localStorage.removeItem('staffFilterHireDateManualEnd');
            } else {
                // 取消全选 - 设置空数组，隐藏所有
                document.querySelectorAll('#hireDateTree input[type="checkbox"]').forEach(cb => cb.checked = false);
                localStorage.setItem('staffFilter_hire_date', JSON.stringify([]));
                // 清空手动输入
                document.getElementById('hireDateManualStart').value = '';
                document.getElementById('hireDateManualEnd').value = '';
                localStorage.removeItem('staffFilterHireDateManualStart');
                localStorage.removeItem('staffFilterHireDateManualEnd');
            }

        // 根据手动输入同步更新树的勾选状态
        function syncTreeFromManualInput(startVal, endVal) {
            if (!startVal && !endVal) {
                // 全选
                document.querySelectorAll('#hireDateTree input[type="checkbox"]').forEach(cb => cb.checked = true);
                return;
            }
            const startDate = startVal ? parseFlexibleDate(startVal) : null;
            const endDate = endVal ? parseFlexibleDate(endVal, true) : null;
            if (!startDate && !endDate) {
                document.querySelectorAll('#hireDateTree input[type="checkbox"]').forEach(cb => cb.checked = true);
                return;
            }
            // 遍历所有日复选框，设置状态
            document.querySelectorAll('.day-check').forEach(cb => {
                const dateVal = cb.dataset.date;
                const d = parseDate(dateVal);
                if (!d) {
                    cb.checked = false;
                    return;
                }
                const startOk = !startDate || d >= startDate;
                const endOk = !endDate || d <= endDate;
                cb.checked = startOk && endOk;
            });
            // 遍历月复选框
            document.querySelectorAll('input[id^="month"]').forEach(cb => {
                const id = cb.id;
                const y = id.substring(5, 9);
                const m = parseInt(id.substring(9));
                const daysInMonth = document.querySelectorAll(`.day-check[data-date^="${y}-${m}-"]`);
                const allChecked = Array.from(daysInMonth).every(dc => dc.checked);
                const someChecked = Array.from(daysInMonth).some(dc => dc.checked);
                cb.checked = allChecked;
                cb.indeterminate = someChecked && !allChecked;
            });
            // 遍历年复选框
            document.querySelectorAll('input[id^="year"]').forEach(cb => {
                const id = cb.id;
                if (id === 'hire_dateAll') return;
                if (id.length !== 8 && id.length !== 9) return;
                const y = id.replace('year', '');
                if (!/^\d{4}$/.test(y)) return;
                const monthsInYear = document.querySelectorAll(`.day-check[data-date^="${y}-"]`);
                const allChecked = Array.from(monthsInYear).every(dc => dc.checked);
                const someChecked = Array.from(monthsInYear).some(dc => dc.checked);
                cb.checked = allChecked;
                cb.indeterminate = someChecked && !allChecked;
            });
        }

        // 解析灵活日期格式，支持：20250101(YYYYMMDD)、202511(YYYYMM)、2025110(YYYYMD)等
        function parseFlexibleDate(str, isEndDate = false) {
            if (!str) return null;
            str = str.replace(/[-\/]/g, ''); // 去掉分隔符
            if (!/^\d+$/.test(str)) return null;
            let year, month, day;
            if (str.length === 8) {
                year = parseInt(str.substring(0, 4));
                month = parseInt(str.substring(4, 6));
                day = parseInt(str.substring(6, 8));
            } else if (str.length === 7) {
                year = parseInt(str.substring(0, 4));
                month = parseInt(str.substring(4, 5));
                day = parseInt(str.substring(5, 7));
            } else if (str.length === 6) {
                year = parseInt(str.substring(0, 4));
                month = parseInt(str.substring(4, 6));
                day = 1;
            } else if (str.length === 5) {
                year = parseInt(str.substring(0, 4));
                month = parseInt(str.substring(4, 5));
                day = 1;
            } else if (str.length === 4) {
                // 纯年份：起始日期用1月1日，结束日期用12月31日
                year = parseInt(str);
                if (isEndDate) {
                    month = 12;
                    day = 31;
                } else {
                    month = 1;
                    day = 1;
                }
            } else {
                return null;
            }
            if (month < 1 || month > 12) return null;
            if (day < 1 || day > 31) return null;
            const d = new Date(year, month - 1, day);
            if (isNaN(d.getTime())) return null;
            return d;
        }

        // 排序列
        function sortColumn(key, order) {
            // 保存排序状态
            localStorage.setItem('staffSort', JSON.stringify({ key, order }));
            // 获取当前筛选匹配的数据并排序
            if (!currentStaffData || currentStaffData.length === 0) return;
            const sorted = [...currentStaffData].sort((a, b) => {
                let va = a[key] || '';
                let vb = b[key] || '';
                // 日期比较
                if (key === 'hire_date') {
                    const da = va ? new Date(va) : new Date(0);
                    const db = vb ? new Date(vb) : new Date(0);
                    return order === 'asc' ? da - db : db - da;
                }
                // 工龄比较：将"X年X月"转换为总月数
                if (key === 'seniority') {
                    const toMonths = (str) => {
                        if (!str) return 0;
                        const years = str.match(/(\d+)年/);
                        const months = str.match(/(\d+)月/);
                        return (years ? parseInt(years[1]) * 12 : 0) + (months ? parseInt(months[1]) : 0);
                    };
                    const ma = toMonths(va);
                    const mb = toMonths(vb);
                    return order === 'asc' ? ma - mb : mb - ma;
                }
                // 数字比较
                if (!isNaN(va) && !isNaN(vb)) {
                    return order === 'asc' ? va - vb : vb - va;
                }
                // 字符串比较
                return order === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
            });
            window.currentDisplayStaff = sorted;
            renderStaffTable(sorted);
            // 关闭下拉
            const dropdown = document.getElementById('headerFilterDropdown');
            if (dropdown) dropdown.style.display = 'none';
            currentFilterKey = null;
        }

            // YYYYMMDD 格式
            if (/^\d{8}$/.test(str)) {
                return new Date(str.substring(0, 4), parseInt(str.substring(4, 6)) - 1, str.substring(6, 8));
            }
            // YYYY-MM-DD 格式
            const d = new Date(str);
            return isNaN(d.getTime()) ? null : d;
        }
