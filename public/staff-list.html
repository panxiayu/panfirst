        function applyHeaderFilter() {
            if (!window.allStaffData) return;

            let filtered = window.allStaffData;
            const filterableKeys = COLUMNS.filter(c => c.key !== 'status').map(c => c.key);

            filterableKeys.forEach(key => {
                if (key === 'hire_date') {
                    // 检查手动输入的日期范围
                    const manualStart = localStorage.getItem('staffFilterHireDateManualStart');
                    const manualEnd = localStorage.getItem('staffFilterHireDateManualEnd');
                    if (manualStart || manualEnd) {
                        const startDate = manualStart ? parseFlexibleDate(manualStart) : null;
                        const endDate = manualEnd ? parseFlexibleDate(manualEnd, true) : null;
                        filtered = filtered.filter(s => {
                            if (!s.hire_date) return false;
                            const d = parseDate(s.hire_date);
                            if (!d) return false;
                            const startOk = !startDate || d >= startDate;
                            const endOk = !endDate || d <= endDate;
                            return startOk && endOk;
                        });
                        return;
                    }
                    // 树形筛选
                    const savedFilterStr = localStorage.getItem('staffFilter_hire_date');
                    if (savedFilterStr === null) return; // 未筛选
                    let savedValues = [];
                    try {
                        savedValues = JSON.parse(savedFilterStr) || [];
                    } catch(e) { return; }
                    if (savedValues.length === 0) {
                        filtered = [];
                        return;
                    }
                    filtered = filtered.filter(s => {
                        if (!s.hire_date) return false;
                        const d = parseDate(s.hire_date);
                        if (!d) return false;
                        const y = d.getFullYear();
                        const m = d.getMonth() + 1;
                        const day = d.getDate();
                        const dateVal = String(y) + '-' + String(m) + '-' + String(day);
                        // 匹配：精确日 或 月(年月相同) 或 年(年相同)
                        return savedValues.some(v => {
                            if (v === dateVal) return true;
                            const parts = String(v).split('-');
                            if (parts.length === 2 && parseInt(parts[0]) === y && parseInt(parts[1]) === m) return true;
                            if (parts.length === 1 && parseInt(parts[0]) === y) return true;
                            return false;
                        });
                    });
                    return;
                }

                const savedFilterStr = localStorage.getItem('staffFilter_' + key);
                if (!savedFilterStr) return;

                let savedValues = [];
                try {
                    savedValues = JSON.parse(savedFilterStr) || [];
                } catch(e) { return; }

                if (savedValues.length === 0) {
                    filtered = []; // 空数组 = 无匹配
                    return;
                }

                filtered = filtered.filter(s => {
                    if (s[key] === undefined || s[key] === null || s[key] === '') return false;
                    return savedValues.includes(s[key]);
                });
            });

            currentStaffData = filtered;

            // 更新计数显示
            filterableKeys.forEach(key => {
                if (key !== 'serial') updateFilterCount(key);
            });

            // 更新筛选图标（根据是否有激活筛选显示漏斗或箭头）
            filterableKeys.forEach(key => {
                if (key !== 'serial') updateFilterIcon(key);
            });

            // 更新序号统计
            const serialCountEl = document.getElementById('serialCount');
            if (serialCountEl) {
                serialCountEl.textContent = filtered.length;
            }

            renderStaffTable(filtered);
        }

        function loadStaff(isInitialLoad = true) {
            const tableContainer = document.getElementById('tableContainer');
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('emptyState');

            if (isInitialLoad) {
                loading.style.display = 'block';
                tableContainer.style.display = 'none';
                emptyState.style.display = 'none';
                // 筛选时淡出效果
                tableContainer.style.transition = 'opacity 0.2s ease';
                tableContainer.style.opacity = '0';
            }

            let url = `${API_URL}/staff?`;

            // 取消上一个请求
            if (loadStaffController) {
                loadStaffController.abort();
            }
            loadStaffController = new AbortController();

            fetch(url, { headers: { 'Authorization': `Bearer ${getToken()}` }, signal: loadStaffController.signal })
            .then(res => res.json())
            .then(data => {
                if (isInitialLoad) {
                    loading.style.display = 'none';
                }
                if (data.code === 0) {
                    // 先保存原始数据
                    const originalData = data.data;
                    window.allStaffData = originalData; // 保存原始数据用于联动筛选

                    // 收集所有字段的唯一值（用于下拉选项）
                    const fieldValues = {};
                    // 动态获取所有列进行唯一值收集
                    const allKeys = new Set();
                    originalData.forEach(s => {
                        Object.keys(s).forEach(k => {
                            if (!k.startsWith('_') && k !== 'id') allKeys.add(k);
                        });
                    });
                    allKeys.forEach(key => {
                        const set = new Set();
                        originalData.forEach(s => {
                            if (s[key]) set.add(s[key]);
                        });
                        fieldValues[key] = [...set].sort((a, b) => {
                            if (typeof a === 'string') return a.localeCompare(b, 'zh-CN');
                            return a - b;
                        });
                    });
                    window.allFieldValues = fieldValues;

                    // Excel 风格客户端筛选 - 搜索和复选框同时生效
                    // 先同步列配置，确保获取到所有列
                    syncColumnsFromData(originalData);

                    let filteredData = originalData;
                    // 动态获取所有可筛选列（排除 status）
                    const filterableKeys = COLUMNS.filter(c => c.key !== 'status').map(c => c.key);
                    filterableKeys.forEach(key => {
                        const savedFilter = localStorage.getItem('staffFilter_' + key);
                        const searchKeyword = localStorage.getItem('staffFilterSearch_' + key);
                        console.log('[DEBUG] key:', key, 'savedFilter:', savedFilter, 'searchKeyword:', searchKeyword);

                        // 搜索和复选框筛选同时生效（AND 条件）
                        filteredData = filteredData.filter(s => {
                            // 入职日期字段特殊处理
                            if (key === 'hire_date') {
                                // 检查手动输入的日期范围
                                const manualStart = localStorage.getItem('staffFilterHireDateManualStart');
                                const manualEnd = localStorage.getItem('staffFilterHireDateManualEnd');
                                if (manualStart || manualEnd) {
                                    const startDate = manualStart ? parseDate(manualStart) : null;
                                    const endDate = manualEnd ? parseDate(manualEnd) : null;
                                    if (!s.hire_date) return false;
                                    const d = parseDate(s.hire_date);
                                    if (!d) return false;
                                    const startOk = !startDate || d >= startDate;
                                    const endOk = !endDate || d <= endDate;
                                    return startOk && endOk;
                                }
                                // 树形筛选
                                const savedFilterStr = localStorage.getItem('staffFilter_hire_date');
                                if (savedFilterStr === null) return true; // 未筛选
                                let savedValues = [];
                                try {
                                    savedValues = JSON.parse(savedFilterStr) || [];
                                } catch(e) { return true; }
                                if (savedValues.length === 0) return false;
                                if (!s.hire_date) return false;
                                const d = parseDate(s.hire_date);
                                if (!d) return false;
                                const y = d.getFullYear();
                                const m = d.getMonth() + 1;
                                const day = d.getDate();
                                const dateVal = String(y) + '-' + String(m) + '-' + String(day);
                                return savedValues.some(v => {
                                    if (v === dateVal) return true;
                                    const parts = String(v).split('-');
                                    if (parts.length === 2 && parseInt(parts[0]) === y && parseInt(parts[1]) === m) return true;
                                    if (parts.length === 1 && parseInt(parts[0]) === y) return true;
                                    return false;
                                });
                            }
                            // 其他字段的搜索和复选框筛选
                            const val = (s[key] || '').toString().toLowerCase();
                            const searchMatch = !searchKeyword || val.includes(searchKeyword);
                            // 复选框筛选：savedFilter 为 null（未保存）= 全选（显示所有），[] = 全部取消（显示所有数据），[values] = 按选中值筛选
                            let checkboxMatch = true;
                            if (savedFilter !== null) {
                                try {
                                    const filterValues = JSON.parse(savedFilter);
                                    // null = 未保存筛选条件，全选显示所有
                                    if (filterValues === null) {
                                        checkboxMatch = true;
                                    } else if (Array.isArray(filterValues) && filterValues.length === 0) {
                                        // 空数组 = 全部取消选中，隐藏所有数据行
                                        checkboxMatch = false;
                                    } else if (Array.isArray(filterValues) && filterValues.length > 0) {
                                        // 有选中值，按选中值筛选
                                        if (s[key] !== undefined && s[key] !== null && s[key] !== '') {
                                            checkboxMatch = filterValues.includes(s[key]);
                                        }
                                    }
                                } catch(e) {}
                            }
                            return searchMatch && checkboxMatch;
                        });
                        console.log('[DEBUG] After filter on', key, ', count:', filteredData.length);
                    });

                    currentStaffData = filteredData;

                    // 重新渲染表头
                    renderTableHeader();
                    // 更新筛选计数和图标
                    console.log('[DEBUG] filterableKeys:', filterableKeys);
                    filterableKeys.forEach(key => {
                        if (key !== 'serial') updateFilterCount(key);
                        if (key !== 'serial') updateFilterIcon(key);
                    });

                    renderStaffTable(filteredData);
                    if (isInitialLoad) {
                        tableContainer.style.display = 'block';
                        requestAnimationFrame(() => {
                            tableContainer.style.opacity = '1';
                        });
                    }
                } else {
                    alert(data.msg);
                }
            })
            .catch(err => {
                if (err.name === 'AbortError') return; // 忽略取消的请求
                document.getElementById('loading').style.display = 'none';
                alert('加载失败');
            });
        }

        // 全局搜索
        let globalSearchKeyword = '';
        function handleGlobalSearch(keyword) {
            globalSearchKeyword = keyword.trim().toLowerCase();
            // 从原始数据过滤并重新渲染
            if (window.allStaffData) {
                const filtered = window.allStaffData.filter(s => {
                    if (!globalSearchKeyword) return true;
                    // 搜索所有字段
                    return Object.values(s).some(val =>
                        val !== null && val !== undefined &&
                        String(val).toLowerCase().includes(globalSearchKeyword)
                    );
                });
                renderStaffTable(filtered);
            }
        }

        function renderStaffTable(list) {
            const visibleNonCheckbox = COLUMNS.filter(c => c.visible);
            const allHidden = visibleNonCheckbox.length === 0;
            if (allHidden) {
                document.getElementById('staffList').innerHTML = `<tr><td colspan="${COLUMNS.length}" style="text-align:center; padding:40px; color:var(--text-muted);">空</td></tr>`;
                return;
            }
            if (list.length === 0) {
                // 无数据时显示空白行，表头和表格容器保持显示
                const colCount = COLUMNS.filter(c => c.visible).length;
                document.getElementById('staffList').innerHTML = `<tr><td colspan="${colCount}" style="text-align:center; padding:40px; color:var(--text-muted);"></td></tr>`;
                return;
            }
            const html = list.map((s, idx) => {
                const isInactive = s.status === 'inactive';
                // 检查是否不在同步名单中（红色标记）
                const isNotInSync = notInExcelStaffIds.has(s.employee_id);
                const rowClass = isInactive ? 'inactive-row' : (isNotInSync ? 'not-in-sync-row' : '');
                const rowStyle = isInactive ? 'color:#999;text-decoration:line-through;' : (isNotInSync ? 'color:var(--danger);' : '');
                const cells = COLUMNS.map(col => {
                    const visStyle = !col.visible ? 'display:none;' : '';
                    const alignStyle = isNotInSync ? 'text-align:center; color:var(--danger);' : 'text-align:center; color:var(--text-primary);';
                    if (col.key === 'serial') {
                        const style = `width:${col.width}; min-width:${col.width}; ${alignStyle} ${visStyle}`;
                        return `<td data-key="${col.key}" style="${style}">${idx + 1}</td>`;
                    }
                    if (col.key === 'employee_id') {
                        const style = `width:${col.width}; min-width:${col.width}; ${alignStyle} ${visStyle}`;
                        const linkStyle = isNotInSync ? 'color:var(--danger);' : '';
                        return `<td data-key="${col.key}" style="${style}"><span class="clickable-link" style="${linkStyle}" onclick="viewStaff(${s.id})">${s.employee_id || '-'}</span></td>`;
                    }
                    if (col.key === 'name') {
                        const style = `width:${col.width}; min-width:${col.width}; ${alignStyle} ${visStyle}`;
                        const linkStyle = isNotInSync ? 'color:var(--danger);' : '';
                        return `<td data-key="${col.key}" style="${style}"><span class="clickable-link" style="${linkStyle}" onclick="viewStaff(${s.id})">${s.name}</span></td>`;
                    }
                    if (col.key === 'status') {
                        const style = `${alignStyle} ${visStyle}`;
                        const sClass = s.status === 'inactive' ? 'badge-inactive' : 'badge-active';
                        const sText = s.status === 'inactive' ? '离职' : '在职';
                        return `<td data-key="${col.key}" style="${style}"><span class="badge ${sClass}">${sText}</span></td>`;
                    }
                    if (col.key === 'team') {
                        let teamVal = s.team || '';
                        if (teamVal.includes('/')) {
                            teamVal = teamVal.split('/').pop();
                        }
                        const style = `${alignStyle} ${visStyle}`;
                        return `<td data-key="${col.key}" style="${style}">${teamVal}</td>`;
                    }
                    const style = `${alignStyle} ${visStyle}`;
                    return `<td data-key="${col.key}" style="${style}">${s[col.key] || '-'}</td>`;
                }).join('');
                return `<tr class="${rowClass}" style="${rowStyle}">${cells}</tr>`;
            }).join('');
            document.getElementById('staffList').innerHTML = html;
            // 更新序号列的统计数字
            const serialCountEl = document.getElementById('serialCount');
            if (serialCountEl) {
                serialCountEl.textContent = list.length;
            }
        }

                `;
            }

            html += `
                <div style="margin-top:20px;display:flex;gap:10px;">
                    <button class="btn btn-primary" onclick="openEditStaffModal()">编辑</button>
                </div>
            `;

            document.getElementById('staffDetailContent').innerHTML = html;
        }

        function closeEditStaffModal() {
            document.getElementById('editStaffModal').classList.remove('active');
        }

        function openEditStaffModal() {
            if (!currentStaffDetail) return;
            document.getElementById('editStaffResult').style.display = 'none';
            document.getElementById('editStaffFields').innerHTML = '';

            const editFields = [
                { key: 'employee_id', label: '工号', type: 'text', required: true },
                { key: 'name', label: '姓名', type: 'text', required: true },
                { key: 'phone', label: '电话', type: 'text' },
                { key: 'department', label: '部门', type: 'text' },
                { key: 'team', label: '班组', type: 'text' },
                { key: 'position', label: '职位', type: 'text' },
                { key: 'hire_date', label: '入职日期', type: 'date' },
                { key: 'status', label: '状态', type: 'select', options: [{ v: 'active', t: '在职' }, { v: 'inactive', t: '离职' }] },
                { key: 'gender', label: '性别', type: 'text' },
                { key: 'birthday', label: '出生年月', type: 'date' },
                { key: 'id_card', label: '身份证', type: 'text' },
                { key: 'bank_account', label: '银行卡', type: 'text' }
            ];

            let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';
            editFields.forEach(f => {
                const val = currentStaffDetail[f.key] || '';
                html += `<div class="form-group" style="margin-bottom:8px;">
                    <label style="display:block;margin-bottom:4px;font-size:12px;color:var(--text-secondary);">${f.label}${f.required ? ' *' : ''}</label>`;
                if (f.type === 'select') {
                    html += `<select id="edit_${f.key}" class="form-control" ${f.required ? 'required' : ''} style="padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;width:100%;box-sizing:border-box;">`;
                    html += `<option value="">请选择</option>`;
                    f.options.forEach(o => {
                        html += `<option value="${o.v}" ${val === o.v ? 'selected' : ''}>${o.t}</option>`;
                    });
                    html += `</select>`;
                } else {
                    html += `<input type="${f.type}" id="edit_${f.key}" class="form-control" value="${val}" ${f.required ? 'required' : ''} style="padding:8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;width:100%;box-sizing:border-box;">`;
                }
                html += '</div>';
            });
            html += '</div>';
            document.getElementById('editStaffFields').innerHTML = html;
            document.getElementById('editStaffModal').classList.add('active');
        }

        function handleEditStaff(e) {
            e.preventDefault();
            if (!currentStaffDetail) return;

            const resultDiv = document.getElementById('editStaffResult');
            resultDiv.style.display = 'none';

            // 收集表单数据，对比原数据只更新变化的字段
            const editFields = ['employee_id', 'name', 'phone', 'department', 'team', 'position', 'hire_date', 'status', 'gender', 'birthday', 'id_card', 'bank_account'];
            const updateData = {};

            editFields.forEach(key => {
                const el = document.getElementById('edit_' + key);
                if (!el) return;
                let newVal = el.value;
                let oldVal = currentStaffDetail[key] || '';

                // 类型转换
                if (key === 'hire_date' || key === 'birthday') {
                    if (newVal !== oldVal) updateData[key] = newVal || null;
                } else if (key === 'status') {
                    if (newVal !== oldVal) updateData[key] = newVal;
                } else {
                    if (newVal !== oldVal) updateData[key] = newVal;
                }
            });

            // 检查是否有更新
            const keys = Object.keys(updateData);
            if (keys.length === 0) {
                resultDiv.innerHTML = '<span style="color:var(--text-muted);">没有修改任何数据</span>';
                resultDiv.style.display = 'block';
                resultDiv.style.background = 'var(--bg-hover)';
                return;
            }

            const token = localStorage.getItem('token');
            const btn = e.target.querySelector('button[type="submit"]');
            btn.textContent = '保存中...';
            btn.disabled = true;

            fetch(`${API_URL}/staff/${currentStaffDetail.id}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(updateData)
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) {
                    resultDiv.innerHTML = '<span style="color:var(--success);">✓ 保存成功</span>';
                    resultDiv.style.display = 'block';
                    resultDiv.style.background = 'rgba(35,165,89,0.1)';
                    // 刷新详情
                    fetchStaffDetail(currentStaffDetail.id);
                    // 刷新列表
                    loadStaff();
                    btn.textContent = '保存';
                    btn.disabled = false;
                } else {
                    resultDiv.innerHTML = `<span style="color:var(--danger);">✗ ${data.msg || '保存失败'}</span>`;
                    resultDiv.style.display = 'block';
                    resultDiv.style.background = 'rgba(235,87,87,0.1)';
                    btn.textContent = '重试';
                    btn.disabled = false;
                }
            })
            .catch(err => {
                resultDiv.innerHTML = '<span style="color:var(--danger);">✗ 网络错误</span>';
                resultDiv.style.display = 'block';
                resultDiv.style.background = 'rgba(235,87,87,0.1)';
                btn.textContent = '重试';
                btn.disabled = false;
            });
        }

        function goBack() { window.location.href = 'dashboard.html'; }

        // 添加员工
        function openAddModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }
        function submitAddStaff(e) {
            e.preventDefault();
            const data = {
                employee_id: document.getElementById('staffEmployeeId').value,
                name: document.getElementById('staffName').value,
                phone: document.getElementById('staffPhone').value,
                department: document.getElementById('staffDepartment').value,
                team: document.getElementById('staffTeam').value,
                hire_date: document.getElementById('staffHireDate').value,
                status: 'active'
            };
            fetch(`${API_URL}/staff`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) { alert('添加成功'); closeAddModal(); loadStaff(); }
                else { alert(data.msg); }
            })
            .catch(() => alert('添加失败'));
        }

        // 批量删除
        function batchDelete() {
            const checked = document.querySelectorAll('tbody input[type="checkbox"]:checked');
            if (checked.length === 0) { alert('请先选择'); return; }
            if (!confirm(`确定删除 ${checked.length} 名员工？`)) return;
            Promise.all([...checked].map(cb =>
                fetch(`${API_URL}/staff/${cb.value}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${getToken()}` } })
                .then(res => res.json())
            )).then(results => {
                const fail = results.filter(r => r.code !== 0).length;
                alert(fail === 0 ? `删除成功` : `成功${results.length - fail}，失败${fail}`);
                loadStaff();
            });
        }

        // 导入
        function showImportModal() { document.getElementById('importModal').style.display = 'flex'; }
        function closeImportModal() { document.getElementById('importModal').style.display = 'none'; }
        function handleImport(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            fetch(`${API_URL}/staff/bulk-import`, { method: 'POST', body: formData, headers: { 'Authorization': `Bearer ${getToken()}` } })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) { alert('导入成功'); closeImportModal(); loadStaff(); }
                else { alert(data.msg || '导入失败'); }
            })
            .catch(() => alert('导入失败'));
        }

        // 同步
        function showSyncModal() {
            document.getElementById('syncResult').style.display = 'none';
            document.getElementById('syncResult').innerHTML = '';
            document.getElementById('syncResult').style.background = '';
            document.getElementById('syncConfirmBtn').style.display = '';
            document.getElementById('syncConfirmBtn').textContent = '确认同步';
            document.getElementById('syncConfirmBtn').disabled = false;
            document.getElementById('syncCancelBtn').textContent = '取消';
            document.getElementById('syncCancelBtn').disabled = false;
            document.getElementById('syncModal').style.display = 'flex';
        }
        function closeSyncModal() { document.getElementById('syncModal').style.display = 'none'; }
        // 存储不在Excel中的人员ID，用于表格红色显示
        let notInExcelStaffIds = new Set();

        async function handleSync() {
            const btn = document.getElementById('syncConfirmBtn');
            const cancelBtn = document.getElementById('syncCancelBtn');
            const resultDiv = document.getElementById('syncResult');
            btn.textContent = '同步中...';
            btn.disabled = true;
            cancelBtn.disabled = true;
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 180000); // 3分钟超时
                const res = await fetch(`${API_URL}/staff/sync-from-smb`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}` },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await res.json();
                if (data.code === 0) {
                    const r = data.data || {};
                    // 记录不在Excel中的人员ID
                    notInExcelStaffIds = new Set((r.notInExcel || []).map(s => s.employee_id));

                    let html = `<div style="color: var(--success); font-weight: 600; margin-bottom: 10px;">✓ 同步完成</div>`;
                    html += `<div style="display: flex; gap: 20px; flex-wrap: wrap;">`;
                    html += `<div>新增: <strong style="color: var(--success);">${r.inserted || 0}</strong> 人</div>`;
                    html += `<div>更新: <strong style="color: var(--accent);">${r.updated || 0}</strong> 人</div>`;
                    if (r.skipped && r.skipped.length > 0) {
                        html += `<div>跳过: <strong>${r.skipped.length}</strong> 人</div>`;
                    }
                    html += `</div>`;
                    if (r.notInExcel && r.notInExcel.length > 0) {
                        html += `<div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 12px; color: var(--danger);">`;
                        html += `<strong>不在Excel中 (${r.notInExcel.length}人，已标红):</strong> ${r.notInExcel.slice(0, 10).map(s => s.name + '(' + s.employee_id + ')').join(', ')}${r.notInExcel.length > 10 ? '...' : ''}`;
                        html += `</div>`;
                    }
                    resultDiv.innerHTML = html;
                    resultDiv.style.background = 'rgba(35,165,89,0.1)';
                    resultDiv.style.display = 'block';
                    btn.style.display = 'none';
                    cancelBtn.textContent = '关闭';
                    cancelBtn.disabled = false;
                    // 记录同步时间到数据库
                    fetch(`${API_URL}/staff/sync-time`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${getToken()}`
                        },
                        body: JSON.stringify({ result: 'success' })
                    }).then(() => showSyncTime());
                    loadStaff();
                } else {
                    resultDiv.innerHTML = `<div style="color: var(--danger);">✗ ${data.msg || '同步失败'}</div>`;
                    resultDiv.style.background = 'rgba(220,38,38,0.1)';
                    resultDiv.style.display = 'block';
                    btn.textContent = '重试';
                    btn.disabled = false;
                    cancelBtn.disabled = false;
                }
            } catch (e) {
                const isTimeout = e.name === 'AbortError';
                resultDiv.innerHTML = `<div style="color: var(--danger);">✗ ${isTimeout ? '同步超时，请重试' : '网络错误'}</div>`;
                resultDiv.style.background = 'rgba(220,38,38,0.1)';
                resultDiv.style.display = 'block';
                btn.textContent = '重试';
                btn.disabled = false;
                cancelBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
