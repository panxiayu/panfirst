<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宁波兴利汽车模具</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; box-sizing: border-box; }

        /* ContraQuest Light Blue 风格 */
        :root {
            --bg: #F0F7FF;
            --card: #ffffff;
            --border: #D6E9FF;
            --primary: #4A90E2;
            --secondary: #65B3FF;
            --accent: #22C58D;
            --text: #1D2B5A;
            --text-soft: #5B72A9;
            --radius: 22px;
            --transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 序列入场动画 */
        .fade-item {
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }
        .fade-in {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .page-header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 18px 0;
            margin-bottom: 28px;
        }
        .page-header .wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-logo { font-size: 18px; font-weight: 700; color: var(--text); }
        .admin-area { display: flex; align-items: center; gap: 16px; }
        .admin-name { font-size: 14px; color: var(--primary); font-weight: 600; }
        .admin-logout {
            padding: 8px 20px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #fff;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: var(--transition);
        }
        .admin-logout:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.25);
        }

        .welcome { margin-bottom: 32px; }
        .welcome h1 { font-size: 26px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
        .welcome p { color: var(--text-soft); font-size: 14px; }

        .section-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 16px; }

        .systems-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
        .system-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .system-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 12px 28px rgba(74, 144, 226, 0.1);
        }
        .system-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .system-icon { width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .system-icon img { width: 100%; height: 100%; object-fit: contain; }
        .system-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; }
        .badge-active { background: linear-gradient(135deg, #D1FAE5, #A7F3D0); color: #065F46; }
        .system-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
        .system-desc { color: var(--text-soft); font-size: 12px; margin-bottom: 14px; line-height: 1.3; }
        .system-stats { display: flex; gap: 20px; padding-top: 12px; border-top: 1px solid var(--border); }
        .sys-stat { display: flex; flex-direction: column; }
        .sys-stat-value { font-size: 18px; font-weight: 700; color: var(--text); }
        .sys-stat-label { font-size: 11px; color: var(--text-soft); margin-top: 2px; }

        @media (max-width: 1024px) {
            .systems-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
        }
        @media (max-width: 900px) {
            .systems-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
        @media (max-width: 768px) {
            .wrap { padding: 0 12px; }
            .page-header { padding: 12px 0; margin-bottom: 16px; }
            .page-logo { font-size: 15px; }
            .admin-area { gap: 10px; }
            .admin-name { font-size: 12px; }
            .admin-logout { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
            .welcome { margin-bottom: 16px; }
            .welcome h1 { font-size: 18px; }
            .welcome p { font-size: 12px; }
            .systems-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
            .system-card { padding: 14px; }
            .section-title { font-size: 14px; margin-bottom: 10px; }
            .system-header { margin-bottom: 8px; }
            .system-icon { width: 50px; height: 50px; }
            .system-name { font-size: 13px; }
            .system-desc { font-size: 11px; margin-bottom: 10px; }
            .system-stats { gap: 12px; padding-top: 8px; }
            .sys-stat-value { font-size: 14px; }
            .sys-stat-label { font-size: 10px; }
        }
        @media (max-width: 480px) {
            .systems-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="wrap" style="justify-content: center; position: relative;">
            <span class="page-logo fade-item">兴利汽车管理后台</span>
            <div class="admin-area fade-item" id="adminArea" style="position: absolute; right: 0;">
                <span id="adminName" class="admin-name">管理员</span>
                <a href="javascript:;" id="adminBtn" class="admin-logout">注销</a>
            </div>
        </div>
    </header>

    <div class="wrap">
        <div class="welcome fade-item">
            <h1>欢迎回来</h1>
            <p id="currentTime">加载中...</p>
        </div>

        <!-- Systems -->
        <h2 class="section-title fade-item">点击进入管理后台</h2>
        <div class="systems-grid" id="systemsGrid">
            <a href="staff-list.html" class="system-card fade-item">
                <div class="system-header">
                    <div class="system-icon staff"><img src="icons/icon-staff-mgmt.svg" alt=""></div>
                    <span class="system-badge badge-active">运行中</span>
                </div>
                <div class="system-name">员工管理</div>
                <div class="system-desc">管理员工信息、部门、职位等基础数据</div>
                <div class="system-stats">
                    <div class="sys-stat">
                        <span class="sys-stat-value" id="staffActive">-</span>
                        <span class="sys-stat-label">在职员工</span>
                    </div>
                    <div class="sys-stat">
                        <span class="sys-stat-value" id="deptCount">-</span>
                        <span class="sys-stat-label">部门数量</span>
                    </div>
                </div>
            </a>

            <a href="exam.html" class="system-card fade-item">
                <div class="system-header">
                    <div class="system-icon exam"><img src="icons/icon-exam.svg" alt=""></div>
                    <span class="system-badge badge-active">运行中</span>
                </div>
                <div class="system-name">培训管理</div>
                <div class="system-desc">学习任务、考试管理、成绩统计</div>
                <div class="system-stats">
                    <div class="sys-stat">
                        <span class="sys-stat-value" id="examPapers">-</span>
                        <span class="sys-stat-label">试卷数量</span>
                    </div>
                    <div class="sys-stat">
                        <span class="sys-stat-value" id="examRecords">-</span>
                        <span class="sys-stat-label">考试记录</span>
                    </div>
                </div>
            </a>

            <a href="meal-list.html" class="system-card fade-item">
                <div class="system-header">
                    <div class="system-icon meal"><img src="icons/icon-meal.svg" alt=""></div>
                    <span class="system-badge badge-active">运行中</span>
                </div>
                <div class="system-name">报餐系统</div>
                <div class="system-desc">员工每日报餐、菜单管理、订单统计</div>
                <div class="system-stats">
                    <div class="sys-stat">
                        <span class="sys-stat-value" id="mealActivities">-</span>
                        <span class="sys-stat-label">活动数量</span>
                    </div>
                    <div class="sys-stat">
                        <span class="sys-stat-value" id="mealOrders">-</span>
                        <span class="sys-stat-label">报餐订单</span>
                    </div>
                </div>
            </a>

            <a href="voting-list.html" class="system-card fade-item">
                <div class="system-header">
                    <div class="system-icon voting"><img src="icons/icon-voting.svg" alt=""></div>
                    <span class="system-badge badge-active">运行中</span>
                </div>
                <div class="system-name">投票系统</div>
                <div class="system-desc">发起投票、收集意见、统计结果</div>
                <div class="system-stats">
                    <div class="sys-stat">
                        <span class="sys-stat-value" id="votingActivities">-</span>
                        <span class="sys-stat-label">投票活动</span>
                    </div>
                    <div class="sys-stat">
                        <span class="sys-stat-value" id="votingRecords">-</span>
                        <span class="sys-stat-label">投票记录</span>
                    </div>
                </div>
            </a>

            <a href="6s-list.html" class="system-card fade-item">
                <div class="system-header">
                    <div class="system-icon staff"><img src="icons/icon-6s.svg" alt=""></div>
                    <span class="system-badge badge-active">运行中</span>
                </div>
                <div class="system-name">6S管理</div>
                <div class="system-desc">6S检查曝光记录，整改追踪管理</div>
                <div class="system-stats">
                    <div class="sys-stat">
                        <span class="sys-stat-value" id="6sTotal">-</span>
                        <span class="sys-stat-label">曝光总数</span>
                    </div>
                    <div class="sys-stat">
                        <span class="sys-stat-value" id="6sPending">-</span>
                        <span class="sys-stat-label">待整改</span>
                    </div>
                </div>
            </a>

            <a href="permission-list.html" class="system-card fade-item">
                <div class="system-header">
                    <div class="system-icon permission"><img src="icons/icon-permission.svg" alt=""></div>
                    <span class="system-badge badge-active">运行中</span>
                </div>
                <div class="system-name">权限管理</div>
                <div class="system-desc">管理系统权限、用户权限配置</div>
                <div class="system-stats">
                    <div class="sys-stat">
                        <span class="sys-stat-value" id="permCount">-</span>
                        <span class="sys-stat-label">权限数量</span>
                    </div>
                </div>
            </a>

            <a href="file-manager.html" class="system-card fade-item">
                <div class="system-header">
                    <div class="system-icon staff"><img src="icons/icon-file.svg" alt=""></div>
                    <span class="system-badge badge-active">运行中</span>
                </div>
                <div class="system-name">文件管理</div>
                <div class="system-desc">上传、下载、管理系统文件资料</div>
                <div class="system-stats">
                    <div class="sys-stat">
                        <span class="sys-stat-value" id="fileCount">-</span>
                        <span class="sys-stat-label">文件数量</span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api';
        const token = localStorage.getItem('token') || localStorage.getItem('adminToken');

        // 权限检查 - 根据权限过滤系统卡片
        function filterSystemCards() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
            const systemsGrid = document.getElementById('systemsGrid');
            const cards = systemsGrid.querySelectorAll('.system-card');

            const permMap = {
                'staff-list.html': 'can_manage_staff',
                'exam.html': 'can_manage_training',
                'meal-list.html': 'can_manage_meal',
                'voting-list.html': 'can_manage_voting',
                '6s-list.html': 'can_manage_6s',
                'permission-list.html': 'can_manage_permission',
                'file-manager.html': 'can_manage_file'
            };

            cards.forEach(card => {
                const href = card.getAttribute('href');
                const permKey = permMap[href];
                if (permKey && currentUser[permKey] !== 1) {
                    card.style.display = 'none';
                }
            });
        }

        function updateTime() {
            const now = new Date();
            const options = {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long',
                hour: '2-digit',
                minute: '2-digit'
            };
            document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN', options);
        }
        updateTime();
        setInterval(updateTime, 1000);

        async function loadDashboardData() {
            if (!token) {
                loadPublicData();
                return;
            }

            const headers = { 'Authorization': `Bearer ${token}` };

            try {
                const [
                    staffRes,
                    examListRes,
                    mealRes,
                    votingRes,
                    fileRes,
                    permRes,
                    sixSRes
                ] = await Promise.all([
                    fetch(`${API_URL}/staff/`, { headers }).then(r => r.json()),
                    fetch(`${API_URL}/exam/list`, { headers }).then(r => r.json()),
                    fetch(`${API_URL}/meal/list`, { headers }).then(r => r.json()),
                    fetch(`${API_URL}/voting/list`, { headers }).then(r => r.json()),
                    fetch(`${API_URL}/file-manager/list`, { headers }).then(r => r.json()).catch(() => ({ data: [] })),
                    fetch(`${API_URL}/admin/permissions`, { headers }).then(r => r.json()).catch(() => ({ data: [] })),
                    fetch(`${API_URL}/6s/stats/summary`, { headers }).then(r => r.json()).catch(() => ({ data: { total: 0, pending: 0, fixed: 0 } }))
                ]);

                document.getElementById('staffCount').textContent = staffRes?.data?.length || 0;
                document.getElementById('examCount').textContent = examListRes?.data?.length || 0;
                document.getElementById('mealCount').textContent = mealRes?.data?.length || 0;
                document.getElementById('votingCount').textContent = votingRes?.data?.length || 0;

                const activeStaff = staffRes?.data?.filter(s => s.status === 'active').length || 0;
                document.getElementById('staffActive').textContent = activeStaff;
                document.getElementById('examPapers').textContent = examListRes?.data?.length || 0;
                document.getElementById('mealActivities').textContent = mealRes?.data?.length || 0;
                document.getElementById('votingActivities').textContent = votingRes?.data?.length || 0;
                document.getElementById('fileCount').textContent = fileRes?.data?.length || 0;
                document.getElementById('permCount').textContent = permRes?.data?.length || 0;
                document.getElementById('6sTotal').textContent = sixSRes?.data?.total || 0;
                document.getElementById('6sPending').textContent = sixSRes?.data?.pending || 0;

                loadDetailedStats();

            } catch (err) {
                console.error('加载数据失败:', err);
                loadPublicData();
            }
        }

        async function loadDetailedStats() {
            const headers = { 'Authorization': `Bearer ${token}` };

            try {
                const [examStatsRes] = await Promise.all([
                    fetch(`${API_URL}/exam/stats/user`, { headers }).then(r => r.json()).catch(() => ({ data: {} }))
                ]);

                document.getElementById('examRecords').textContent = examStatsRes?.data?.summary?.total_exams || 0;
            } catch (err) {
                console.error('加载详细统计失败:', err);
            }
        }

        async function loadPublicData() {
            try {
                const [staffRes, votingRes] = await Promise.all([
                    fetch(`${API_URL}/staff/`).then(r => r.json()).catch(() => ({ data: [] })),
                    fetch(`${API_URL}/voting/list`).then(r => r.json()).catch(() => ({ data: [] }))
                ]);

                document.getElementById('staffCount').textContent = staffRes?.data?.length || 0;
                document.getElementById('votingCount').textContent = votingRes?.data?.length || 0;
            } catch (err) {
                console.log('加载公共数据失败');
            }
        }

        function loadUserInfo() {
            const user = JSON.parse(localStorage.getItem('currentUser') || localStorage.getItem('user') || '{}');
            if (user.nickname) {
                const userNameEl = document.getElementById('userName');
                const userAvatarEl = document.getElementById('userAvatar');
                if (userNameEl) userNameEl.textContent = user.nickname;
                if (userAvatarEl) userAvatarEl.textContent = user.nickname.charAt(0);
            }
        }

        function updateAdminButton() {
            const token = localStorage.getItem('token') || localStorage.getItem('adminToken');
            const adminBtn = document.getElementById('adminBtn');
            const adminName = document.getElementById('adminName');
            const adminArea = document.getElementById('adminArea');
            if (token) {
                adminArea.style.display = 'flex';
                const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
                adminName.textContent = user.nickname || '管理员';
            } else {
                adminArea.style.display = 'none';
            }
        }

        // 绑定按钮事件
        function bindAdminBtn() {
            const btn = document.getElementById('adminBtn');
            if (btn) {
                btn.onclick = function() {
                    const token = localStorage.getItem('token') || localStorage.getItem('adminToken');
                    if (token) {
                        localStorage.removeItem('token');
                        localStorage.removeItem('adminToken');
                        localStorage.removeItem('currentUser');
                        localStorage.removeItem('user');
                        // 清除后跳转到首页
                        window.location.href = window.location.origin + '/';
                    } else {
                        window.location.href = window.location.origin + '/admin/login.html';
                    }
                };
            }
        }

        // 执行更新按钮
        updateAdminButton();
        bindAdminBtn();

        loadUserInfo();
        loadDashboardData();
        filterSystemCards();

        // ContraQuest 序列入场动画
        const items = document.querySelectorAll('.fade-item');
        items.forEach((el, i) => {
            setTimeout(() => el.classList.add('fade-in'), 100 * i);
        });
    </script>
</body>
</html>
