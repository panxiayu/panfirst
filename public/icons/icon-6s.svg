<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 底座渐变 - 淡橙色 -->
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD4A8"/>
      <stop offset="50%" stop-color="#FFC890"/>
      <stop offset="100%" stop-color="#FFB870"/>
    </linearGradient>

    <!-- 板身渐变 -->
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F0F8"/>
    </linearGradient>

    <!-- 夹子渐变 -->
    <linearGradient id="clipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E0F5"/>
      <stop offset="50%" stop-color="#D0C4E8"/>
      <stop offset="100%" stop-color="#B8A8D8"/>
    </linearGradient>

    <!-- 勾选绿 -->
    <radialGradient id="checkGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6AE898"/>
      <stop offset="100%" stop-color="#40CE70"/>
    </radialGradient>

    <!-- 高光 -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- 阴影 -->
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#D09050" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 底座阴影 -->
  <ellipse cx="64" cy="112" rx="38" ry="10" fill="#FFB870" opacity="0.3" filter="url(#softBlur)"/>

  <!-- 圆角方形底座 -->
  <rect x="12" y="12" width="104" height="104" rx="28" fill="url(#baseGrad)"/>
  <rect x="12" y="12" width="104" height="104" rx="28" fill="url(#gloss)" opacity="0.3"/>

  <!-- 板身阴影 -->
  <rect x="30" y="30" width="68" height="82" rx="8" fill="#D0C4E0" opacity="0.3" transform="translate(4, 4)"/>

  <!-- 板身 -->
  <rect x="26" y="24" width="68" height="88" rx="8" fill="url(#boardGrad)" filter="url(#dropShadow)"/>

  <!-- 板身边框 -->
  <rect x="26" y="24" width="68" height="88" rx="8" fill="none" stroke="#E8E0F0" stroke-width="2"/>

  <!-- 顶部高光 -->
  <rect x="30" y="26" width="60" height="18" rx="5" fill="url(#gloss)" opacity="0.4"/>

  <!-- 夹子阴影 -->
  <rect x="46" y="12" width="36" height="16" rx="5" fill="#9080B0" opacity="0.3" transform="translate(3, 3)"/>

  <!-- 夹子主体 -->
  <rect x="44" y="8" width="36" height="20" rx="6" fill="url(#clipGrad)"/>

  <!-- 夹子高光 -->
  <rect x="46" y="10" width="32" height="8" rx="4" fill="#F0E8FF" opacity="0.5"/>

  <!-- 夹子凹槽 -->
  <rect x="54" y="14" width="16" height="6" rx="3" fill="#8878A0"/>

  <!-- 列表项1 -->
  <g transform="translate(34, 52)">
    <!-- 勾选框阴影 -->
    <rect x="2" y="2" width="18" height="18" rx="5" fill="#40CE70" opacity="0.3"/>

    <!-- 勾选框 -->
    <rect x="0" y="0" width="18" height="18" rx="5" fill="#FFFFFF" stroke="#D0C4E8" stroke-width="2"/>

    <!-- 绿色圆形勾选 -->
    <circle cx="9" cy="9" r="7" fill="url(#checkGrad)"/>
    <path d="M5 9 L8 12 L13 6" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- 文字线 -->
    <rect x="28" y="3" width="40" height="5" rx="2.5" fill="#C0B0D8"/>
    <rect x="28" y="12" width="28" height="4" rx="2" fill="#E0D4F0"/>
  </g>

  <!-- 列表项2 -->
  <g transform="translate(34, 78)">
    <!-- 勾选框阴影 -->
    <rect x="2" y="2" width="18" height="18" rx="5" fill="#40CE70" opacity="0.3"/>

    <!-- 勾选框 -->
    <rect x="0" y="0" width="18" height="18" rx="5" fill="#FFFFFF" stroke="#D0C4E8" stroke-width="2"/>

    <!-- 绿色圆形勾选 -->
    <circle cx="9" cy="9" r="7" fill="url(#checkGrad)"/>
    <path d="M5 9 L8 12 L13 6" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- 文字线 -->
    <rect x="28" y="3" width="34" height="5" rx="2.5" fill="#C0B0D8"/>
    <rect x="28" y="12" width="22" height="4" rx="2" fill="#E0D4F0"/>
  </g>

  <!-- 右侧高光 -->
  <rect x="88" y="24" width="4" height="88" rx="2" fill="#FFFFFF" opacity="0.2"/>

  <!-- 底部高光 -->
  <rect x="30" y="100" width="60" height="8" rx="4" fill="#FFFFFF" opacity="0.15"/>
</svg>