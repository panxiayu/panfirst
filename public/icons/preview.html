<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D拟物图标预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 80px 20px;
        }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 60px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .icons-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            justify-content: center;
            max-width: 900px;
            margin: 0 auto;
        }
        .icon-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 30px;
            padding: 50px 35px;
            text-align: center;
            box-shadow:
                0 30px 60px rgba(0,0,0,0.3),
                0 15px 30px rgba(0,0,0,0.2),
                inset 0 2px 0 rgba(255,255,255,1);
            width: 200px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .icon-card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow:
                0 40px 80px rgba(0,0,0,0.35),
                0 20px 40px rgba(0,0,0,0.25),
                inset 0 2px 0 rgba(255,255,255,1);
        }
        .icon-card img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            margin-bottom: 25px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
        }
        .icon-card .name {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }
        .icon-card .desc {
            font-size: 13px;
            color: #888;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <h1>3D 拟物图标</h1>
    <div class="icons-grid">
        <div class="icon-card">
            <img src="icon-meal.png" alt="报餐">
            <div class="name">报餐</div>
            <div class="desc">报餐系统</div>
        </div>

        <div class="icon-card">
            <img src="icon-training.png" alt="培训">
            <div class="name">培训</div>
            <div class="desc">培训系统</div>
        </div>

        <div class="icon-card">
            <img src="icon-6s.png" alt="6S管理">
            <div class="name">6S管理</div>
            <div class="desc">6S管理</div>
        </div>

        <div class="icon-card">
            <img src="icon-voting.png" alt="投票">
            <div class="name">投票</div>
            <div class="desc">投票系统</div>
        </div>

        <div class="icon-card">
            <img src="icon-employee.png" alt="员工">
            <div class="name">员工管理</div>
            <div class="desc">员工管理</div>
        </div>

        <div class="icon-card">
            <img src="icon-file.png" alt="文件">
            <div class="name">文件管理</div>
            <div class="desc">文件管理</div>
        </div>

        <div class="icon-card">
            <img src="icon-permission.png" alt="权限">
            <div class="name">权限管理</div>
            <div class="desc">权限管理</div>
        </div>
    </div>
</body>
</html>
