<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>权限管理 - 兴利汽车模具</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
        * { -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #F0F7FF;
            --card: #ffffff;
            --border: #D6E9FF;
            --primary: #4A90E2;
            --secondary: #65B3FF;
            --accent: #22C58D;
            --text: #1D2B5A;
            --text-soft: #5B72A9;
            --radius: 22px;
            --transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* 序列入场动画 */
        .fade-item { opacity: 0; transform: translateY(30px); transition: var(--transition); }
        .fade-in { opacity: 1 !important; transform: translateY(0) !important; }

        /* 页面头部 - 使用 theme.css 的 toolbar 和 page-title */

        /* 按钮 */
        .btn { padding: 10px 20px; border: none; border-radius: 14px; cursor: pointer; font-size: 13px; font-weight: 600; transition: var(--transition); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(74, 144, 226, 0.15); }
        .btn-sm { padding: 8px 14px; font-size: 12px; border-radius: 10px; }

        /* 标签页 */
        .perm-tabs { display: flex; gap: 6px; margin-bottom: 24px; background: var(--card); padding: 6px; border-radius: var(--radius); border: 1px solid var(--border); flex-wrap: wrap; position: relative; }
        .perm-tab { padding: 12px 20px; border: none; background: transparent; color: var(--text-soft); font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 16px; transition: color 0.3s ease; white-space: nowrap; position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; }
        .perm-tab:hover { color: var(--text); }
        .perm-tab.active { color: #fff; font-weight: 600; }
        .perm-tab-indicator { position: absolute; top: 6px; bottom: 6px; left: 6px; min-width: 60px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 16px; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), width 0.35s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1; box-shadow: 0 2px 8px rgba(74, 144, 226, 0.3); }
        .perm-tabs-container { position: relative; overflow: hidden; min-height: calc(100vh - 200px); }
        .perm-section { display: block; opacity: 0; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease; pointer-events: none; position: absolute; top: 0; left: 0; width: 100%; }
        .perm-section.active { opacity: 1; transform: translateX(0); pointer-events: auto; }

        /* 管理员卡片 */
        .admin-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding-top: 5px; }
        .admin-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; transition: var(--transition); }
        .admin-item:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 12px 28px rgba(74, 144, 226, 0.1); }
        .admin-item-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
        .admin-info { display: flex; align-items: center; gap: 14px; }
        .admin-avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; box-shadow: 0 4px 12px rgba(74, 144, 226, 0.2); }
        .admin-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .admin-meta { font-size: 12px; color: var(--text-soft); }
        .admin-actions { display: flex; gap: 8px; }
        .admin-systems { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 14px; border-top: 1px solid var(--border); }
        .sys-tag { padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; }
        .sys-tag.on { background: rgba(34, 197, 94, 0.12); color: #16a34a; }
        .sys-tag.off { background: rgba(107, 114, 128, 0.1); color: #9ca3af; }

        /* 资源列表 */
        .resource-list { display: grid; gap: 16px; }
        .resource-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: var(--transition); }
        .resource-item:hover { border-color: var(--primary); box-shadow: 0 8px 20px rgba(74, 144, 226, 0.08); }
        .resource-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; cursor: pointer; }
        .resource-header:hover { background: rgba(74, 144, 226, 0.02); }
        .resource-title { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 10px; }
        .resource-meta { font-size: 12px; color: var(--text-soft); margin-top: 4px; }
        .resource-right { display: flex; align-items: center; gap: 12px; }
        .perm-count { font-size: 12px; color: var(--text-soft); }
        .resource-arrow { font-size: 14px; color: var(--text-soft); transition: transform 0.25s; }
        .resource-item.open .resource-arrow { transform: rotate(90deg); }
        .resource-body { display: none; padding: 20px; border-top: 1px solid var(--border); background: rgba(74, 144, 226, 0.01); }
        .resource-item.open .resource-body { display: block; }

        /* 表格 */
        .table-container { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .data-table th, .data-table td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border); }
        .data-table th { background: rgba(74, 144, 226, 0.05); font-size: 11px; font-weight: 600; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.5px; }
        .data-table tr:hover td { background: rgba(74, 144, 226, 0.02); }
        .perm-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .perm-on { background: rgba(34, 197, 94, 0.12); color: #16a34a; }
        .perm-off { background: rgba(239, 68, 68, 0.1); color: #dc2626; }

        /* 复选框 */
        .perm-checkboxes { display: flex; gap: 20px; flex-wrap: wrap; }
        .perm-checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }
        .perm-checkbox input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }

        /* 全选行 */
        .select-all-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: rgba(74, 144, 226, 0.05); border-radius: var(--radius); margin-bottom: 14px; }
        .select-all-row label { font-size: 14px; cursor: pointer; }

        /* 状态提示 */
        .loading, .empty-state { text-align: center; padding: 60px 20px; color: var(--text-soft); font-size: 14px; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(29, 43, 90, 0.4); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-box { background: var(--card); border-radius: var(--radius); padding: 28px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(29, 43, 90, 0.15); }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: var(--text-soft); }
        .form-control { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 14px; font-size: 14px; background: var(--bg); color: var(--text); transition: var(--transition); }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1); }
        .form-control[readonly] { background: rgba(74, 144, 226, 0.05); }
        textarea.form-control { resize: vertical; min-height: 100px; font-family: inherit; }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
        .import-area { width: 100%; height: 180px; border: 1px solid var(--border); border-radius: 14px; padding: 12px; font-size: 13px; font-family: monospace; background: var(--bg); color: var(--text); resize: vertical; }
        .import-area:focus { outline: none; border-color: var(--primary); }
        .import-help { font-size: 12px; color: var(--text-soft); margin-top: 8px; line-height: 1.5; }
        .import-result { margin-top: 12px; padding: 12px; border-radius: 12px; font-size: 13px; display: none; }
        .import-result.success { background: rgba(34, 197, 94, 0.1); color: #16a34a; display: block; }
        .import-result.error { background: rgba(239, 68, 68, 0.1); color: #dc2626; display: block; }

        /* 报餐权限样式 - 与培训任务人员列表一致 */
        .meal-perm-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; height: 77vh; overflow: hidden; display: flex; flex-direction: column; box-sizing: border-box; }
        .meal-perm-header { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; flex-shrink: 0; padding-left: 6px; }
        .meal-perm-title { font-size: 16px; font-weight: 600; }
        .meal-perm-stat { display: inline-flex; align-items: center; padding: 6px 14px; background: var(--bg); border-radius: 12px; font-size: 13px; color: var(--text-soft); }
        .meal-perm-stat .stat-num { font-size: 16px; font-weight: 700; color: var(--primary); margin-right: 4px; }
        .meal-perm-list-wrap { flex: 1; overflow-y: auto; border-radius: 12px; border: 1px solid #F0F7FF; background: #fff; padding: 12px; min-height: 200px; box-sizing: border-box; }
        .meal-perm-list { }
        .meal-perm-list-header { display: flex; align-items: center; padding: 6px 0 6px 12px; border-bottom: 1px solid #E5F0FF; margin-bottom: 10px; gap: 8px; }
        .meal-perm-list-header input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
        .meal-perm-list-header span { font-size: 12px; font-weight: 600; color: var(--primary); }
        .meal-perm-list-header .dept-count { font-size: 11px; color: var(--text-soft); margin-left: 4px; }
        .meal-perm-list-item { display: flex; align-items: center; padding: 8px 10px; border-radius: 8px; background: #FAFAFA; margin-bottom: 6px; gap: 8px; transition: var(--transition); }
        .meal-perm-list-item:hover { background: rgba(74, 144, 226, 0.05); }
        .meal-perm-list-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
        .meal-perm-avatar { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 11px; flex-shrink: 0; }
        .meal-perm-info { flex: 1; min-width: 0; }
        .meal-perm-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meal-perm-meta { font-size: 10px; color: var(--text-soft); }
        .meal-perm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .meal-perm-empty { text-align: center; padding: 40px; color: var(--text-soft); }

        /* 6S权限样式 - 与管理员卡片一致 */
        .s6-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; padding-top: 5px; }
        .s6-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; transition: var(--transition); }
        .s6-item:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 12px 28px rgba(74, 144, 226, 0.1); }
        .s6-item-top { display: flex; align-items: center; justify-content: space-between; }
        .s6-info { display: flex; align-items: center; gap: 14px; flex: 1; }
        .s6-avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; box-shadow: 0 4px 12px rgba(74, 144, 226, 0.2); }
        .s6-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .s6-meta { font-size: 12px; color: var(--text-soft); }
        .s6-actions { flex-shrink: 0; }

        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #dc2626; border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.15); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.15); }

        /* 响应式 */
        @media (max-width: 768px) {
            .container { padding: 0 12px; }
            .admin-list { grid-template-columns: 1fr; gap: 12px; }
            .meal-perm-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <div class="toolbar">
            <div class="toolbar-left">
                <span class="page-title">权限管理</span>
            </div>
            <div class="toolbar-right">
                <button class="btn btn-secondary btn-sm" onclick="showLogModal()">日志</button>
                <button class="btn btn-secondary btn-sm" onclick="location.href='dashboard.html'">返回</button>
                <button class="btn btn-primary btn-sm" id="addAdminBtn" onclick="showAddAdminModal()">+ 添加管理员</button>
                <button class="btn btn-primary btn-sm" id="addS6Btn" style="display: none;" onclick="showAddS6Modal()">+ 添加6S权限</button>
            </div>
        </div>

        <div class="perm-tabs fade-item">
            <button class="perm-tab active" onclick="switchTab('admin')" data-tab="admin">管理员</button>
            <button class="perm-tab" onclick="switchTab('exam')" data-tab="exam">考试权限</button>
            <button class="perm-tab" onclick="switchTab('meal')" data-tab="meal">报餐权限</button>
            <button class="perm-tab" onclick="switchTab('s6')" data-tab="s6">6S权限</button>
            <button class="perm-tab" onclick="switchTab('file')" data-tab="file">文件权限</button>
            <div class="perm-tab-indicator"></div>
        </div>

        <!-- 标签页内容区域 -->
        <div class="perm-tabs-container">
            <!-- 管理员管理 -->
            <div id="section-admin" class="perm-section active">
                <div id="adminList" class="admin-list"></div>
            </div>

            <!-- 考试权限 -->
            <div id="section-exam" class="perm-section">
                <div class="toolbar" style="margin-bottom: 12px;">
                    <div style="font-size: 13px; color: var(--text-secondary);">点击考试名称查看/编辑权限人员</div>
                    <button class="btn btn-secondary btn-sm" onclick="showExamImportModal()">批量导入</button>
                </div>
                <div class="resource-list" id="examList"></div>
            </div>

            <!-- 报餐权限 -->
            <div id="section-meal" class="perm-section">
                <div class="meal-perm-card fade-item">
                    <div class="meal-perm-header">
                        <div class="meal-perm-title">客餐权限配置</div>
                        <div class="meal-perm-stat">
                            <span class="stat-num" id="guestMealCountNum">0</span>
                            <span>人有客餐权限</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;margin-left:12px;">
                            <input type="text" id="searchGuestMealKeyword" placeholder="姓名" oninput="filterGuestMealStaff()" style="padding:8px 12px;border-radius:8px;border:1px solid #E5F0FF;font-size:13px;width:80px;outline:none;background:#fff;">
                            <input type="text" id="searchGuestMealEmpId" placeholder="工号" oninput="filterGuestMealStaff()" style="padding:8px 12px;border-radius:8px;border:1px solid #E5F0FF;font-size:13px;width:70px;outline:none;background:#fff;">
                            <select id="searchGuestMealPerm" onchange="filterGuestMealStaff()" style="padding:8px 12px;border-radius:8px;border:1px solid #E5F0FF;font-size:13px;outline:none;color:#5B72A9;background:#fff;">
                                <option value="">全部状态</option>
                                <option value="has">有权限</option>
                                <option value="no">无权限</option>
                            </select>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
                            <button class="btn btn-secondary btn-sm" onclick="toggleAllGuestMealChecked(true)">全选</button>
                            <button class="btn btn-secondary btn-sm" onclick="toggleAllGuestMealChecked(false)">全部取消</button>
                            <button class="btn btn-primary btn-sm" onclick="saveGuestMealPermAll()">保存权限</button>
                        </div>
                    </div>
                    <div id="mealPermSearchArea" style="margin-bottom:12px;padding:12px 16px;background:#F8FCFF;border-radius:12px;flex-shrink:0;">
                        <div id="mealPermDeptFilterArea" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
                    </div>
                    <div id="guestMealStaffList" class="meal-perm-list-wrap"></div>
                </div>
            </div>

            <!-- 6S权限 -->
            <div id="section-s6" class="perm-section">
                <div id="s6StaffList" class="s6-list"></div>
            </div>

            <!-- 文件权限 -->
            <div id="section-file" class="perm-section">
                <div class="toolbar" style="margin-bottom: 12px;">
                    <div style="font-size: 13px; color: var(--text-secondary);">
                        <strong>公共权限：</strong>按权限可见 | <strong>个人权限：</strong>仅可见自己上传的文件
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-secondary btn-sm" onclick="showFilePublicImportModal()">公共批量导入</button>
                        <button class="btn btn-secondary btn-sm" onclick="showFilePersonalImportModal()">个人批量导入</button>
                    </div>
                </div>
                <div class="resource-list">
                    <div class="resource-item open" onclick="toggleResource(this)">
                        <div class="resource-header">
                            <div class="resource-title">公共文件权限</div>
                            <div class="resource-right">
                                <span class="resource-arrow">›</span>
                            </div>
                        </div>
                        <div class="resource-body" id="filePublicBody"></div>
                    </div>
                    <div class="resource-item" onclick="toggleResource(this)">
                        <div class="resource-header">
                            <div class="resource-title">个人文件权限</div>
                            <div class="resource-right">
                                <span class="resource-arrow">›</span>
                            </div>
                        </div>
                        <div class="resource-body" id="filePersonalBody"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加管理员弹窗 -->
    <div class="modal" id="adminModal">
        <div class="modal-box" style="max-width: 480px; padding: 20px;">
            <div class="modal-title" id="adminModalTitle">添加管理员</div>
            <form onsubmit="handleAdminSave(event)">
                <input type="hidden" id="adminId">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div class="form-group">
                        <label>工号 *</label>
                        <input type="text" id="adminEmployeeId" class="form-control" required placeholder="员工工号" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" id="adminName" class="form-control" placeholder="输入姓名自动匹配" autocomplete="off">
                    </div>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label>密码 <span id="passwordHint" style="color: var(--text-secondary); font-weight: normal;">（至少6位）</span></label>
                    <input type="password" id="adminPassword" class="form-control" required placeholder="登录密码">
                </div>
                <div class="form-group">
                    <label style="margin-bottom: 10px;">系统权限</label>
                    <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                        <label class="perm-checkbox"><input type="checkbox" id="permStaff" value="1"> 员工管理</label>
                        <label class="perm-checkbox"><input type="checkbox" id="permTraining" value="1"> 培训管理</label>
                        <label class="perm-checkbox"><input type="checkbox" id="permMeal" value="1"> 报餐系统</label>
                        <label class="perm-checkbox"><input type="checkbox" id="permVoting" value="1"> 投票系统</label>
                        <label class="perm-checkbox"><input type="checkbox" id="perm6s" value="1"> 6S管理</label>
                        <label class="perm-checkbox"><input type="checkbox" id="permPermission" value="1"> 权限管理</label>
                        <label class="perm-checkbox"><input type="checkbox" id="permFile" value="1"> 文件管理</label>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary btn-sm" onclick="closeAdminModal()">取消</button>
                    <button type="submit" class="btn btn-primary btn-sm" id="adminSaveBtn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 6S权限添加弹窗 -->
    <div class="modal" id="s6Modal">
        <div class="modal-box" style="max-width: 340px; padding: 16px;">
            <div class="modal-title" id="s6ModalTitle">添加6S权限</div>
            <form onsubmit="handleAddS6Perm(event)">
                <div class="form-group">
                    <label>工号 *</label>
                    <input type="text" id="s6EmployeeId" class="form-control" required placeholder="员工工号" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="s6EmployeeName" class="form-control" placeholder="输入姓名或工号自动匹配" autocomplete="off">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary btn-sm" onclick="closeS6Modal()">取消</button>
                    <button type="submit" class="btn btn-primary btn-sm" id="s6SaveBtn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 考试权限弹窗 -->
    <div class="modal" id="examModal">
        <div class="modal-box">
            <div class="modal-title" id="examModalTitle">
                <span>考试权限设置</span>
                <div style="display:flex;gap:8px;margin-left:auto;">
                    <button type="button" class="btn btn-primary btn-sm" onclick="saveExamPerm()">保存</button>
                    <button type="button" class="btn btn-secondary btn-sm" onclick="closeExamModal()">取消</button>
                </div>

    <!-- 日志弹窗 -->
    <div class="modal" id="logModal">
        <div class="modal-box" style="max-width: 600px;">
            <div class="modal-title">
                <span>操作日志</span>
                <button type="button" class="btn btn-secondary btn-sm" onclick="closeLogModal()" style="margin-left: auto;">关闭</button>
            </div>
            <div id="logList" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/xlsx.full.min.js"></script>
    <script>
        const API_URL = window.location.origin + '/api';
        let token = localStorage.getItem('token');
        let admins = [];
        let currentTab = 'admin';
        let currentExamId = null;
        let allStaff = [];
        let actionLogs = [];

        const tabNames = { admin: '管理员', exam: '考试权限', meal: '报餐权限', s6: '6S权限', file: '文件权限' };

        function logAction(action, status = 'success') {
            fetch(`${API_URL}/admin/log`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ tab: tabNames[currentTab], action, status })
            }).catch(err => console.error('记录日志失败:', err));
        }

        async function loadLogs() {
            try {
                const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
                const isAdmin = currentUser.id === 1;
                const url = isAdmin
                    ? `${API_URL}/admin/logs?tab=${encodeURIComponent(tabNames[currentTab])}`
                    : `${API_URL}/admin/logs?tab=${encodeURIComponent(tabNames[currentTab])}&user_id=${currentUser.id}`;
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.code === 0) {
                    actionLogs = data.data || [];
                }
            } catch (err) { console.error('加载日志失败:', err); }
        }

        async function showLogModal() {
            await loadLogs();
            const logList = document.getElementById('logList');
            if (actionLogs.length === 0) {
                logList.innerHTML = '<div class="empty-state">暂无操作记录</div>';
            } else {
                logList.innerHTML = '<div style="display: flex; flex-direction: column; gap: 8px;">' + actionLogs.map(log => `
                    <div style="padding: 10px 12px; background: ${log.status === 'fail' ? 'rgba(239, 68, 68, 0.08)' : 'var(--bg)'}; border-radius: 10px; font-size: 13px; border-left: 3px solid ${log.status === 'fail' ? '#dc2626' : 'var(--primary)'};">
                        <span style="color: ${log.status === 'fail' ? '#dc2626' : 'var(--primary)'}; font-weight: 600;">${log.created_at ? new Date(log.created_at).toLocaleString('zh-CN') : '-'}</span>
                        <span style="margin: 0 8px; color: var(--text-soft);">|</span>
                        <span style="background: rgba(74, 144, 226, 0.1); padding: 2px 8px; border-radius: 6px;">${log.tab}</span>
                        <span style="margin-left: 8px; color: var(--text-soft);">by ${log.username}</span>
                        ${log.status === 'fail' ? '<span style="margin-left: 8px; color: #dc2626; font-size: 12px;">失败</span>' : ''}
                        <div style="margin-top: 4px; color: ${log.status === 'fail' ? '#dc2626' : 'var(--text)'};">${log.action}</div>
                    </div>
                `).join('') + '</div>';
            }
            document.getElementById('logModal').classList.add('active');
        }

        function closeLogModal() {
            document.getElementById('logModal').classList.remove('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!token) { window.location.href = 'admin/login.html'; return; }
            // 权限检查
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
            if (!currentUser.can_manage_permission) { alert('无权限访问权限管理'); window.location.href = 'dashboard.html'; return; }
            loadAllData();
            // 工号输入匹配姓名
            document.getElementById('adminEmployeeId').addEventListener('blur', async function() {
                const empId = this.value.trim();
                if (!empId || this.disabled) return;
                try {
                    const res = await fetch(`${API_URL}/staff?search=${encodeURIComponent(empId)}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (data.code === 0 && data.data && data.data.length > 0) {
                        const matched = data.data.find(s => s.employee_id === empId);
                        const staff = matched || data.data[0];
                        document.getElementById('adminName').value = staff.name || '';
                    }
                } catch (e) { /* ignore */ }
            });
            // 姓名输入匹配工号
            document.getElementById('adminName').addEventListener('blur', async function() {
                const name = this.value.trim();
                if (!name || this.disabled) return;
                try {
                    const res = await fetch(`${API_URL}/staff?search=${encodeURIComponent(name)}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (data.code === 0 && data.data && data.data.length > 0) {
                        const matched = data.data.find(s => s.name === name);
                        const staff = matched || data.data[0];
                        document.getElementById('adminEmployeeId').value = staff.employee_id || '';
                    }
                } catch (e) { /* ignore */ }
            });
            // 检查是否为admin账号，只有admin才能添加管理员
            if (currentUser.id !== 1) {
                document.getElementById('addAdminBtn').style.display = 'none';
            }
            // 初始化标签指示器
            initTabIndicator();
            // 序列入场动画
            const items = document.querySelectorAll('.fade-item');
            items.forEach((el, i) => {
                setTimeout(() => el.classList.add('fade-in'), 100 * i);
            });
        });

        let lastTab = 'admin';
        let tabSwitching = false;
        function switchTab(tab) {
            if (currentTab === tab || tabSwitching) return;
            tabSwitching = true;

            // 更新指示器位置
            const indicator = document.querySelector('.perm-tab-indicator');
            const activeTab = document.querySelector(`.perm-tab[data-tab="${tab}"]`);
            if (indicator && activeTab) {
                const tabRect = activeTab.getBoundingClientRect();
                const containerRect = activeTab.parentElement.getBoundingClientRect();
                // indicator初始left是6px，需要减去这个偏移
                const left = tabRect.left - containerRect.left - 6;
                indicator.style.transform = `translateX(${left}px)`;
                indicator.style.width = `${tabRect.width}px`;
            }

            const oldSection = document.querySelector('.perm-section.active');
            const newSection = document.getElementById(`section-${tab}`);
            const tabOrder = ['admin', 'exam', 'meal', 's6', 'file'];
            const tabIndex = tabOrder.indexOf(tab);
            const lastIndex = tabOrder.indexOf(lastTab);
            const direction = tabIndex > lastIndex ? 1 : -1; // 1=右滑, -1=左滑

            // 旧section向左/右滑出
            if (oldSection) {
                oldSection.style.transition = 'transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease';
                oldSection.style.transform = `translateX(${direction * -100}%)`;
                oldSection.style.opacity = '0';
                setTimeout(() => {
                    oldSection.classList.remove('active');
                    oldSection.style.transition = '';
                    oldSection.style.transform = '';
                    oldSection.style.opacity = '';
                }, 350);
            }

            // 新section从反方向滑入
            newSection.classList.add('active');
            newSection.style.transform = `translateX(${direction * 100}%)`;
            newSection.style.opacity = '0';
            newSection.style.transition = 'transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease';

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    newSection.style.transform = 'translateX(0)';
                    newSection.style.opacity = '1';
                });
            });

            // 动画完成后重置样式
            setTimeout(() => {
                newSection.style.transition = '';
                newSection.style.transform = '';
                newSection.style.opacity = '';
                // 触发内容入场动画
                newSection.querySelectorAll('.fade-item').forEach((el, i) => {
                    el.classList.remove('fade-in');
                    setTimeout(() => el.classList.add('fade-in'), 80 * i);
                });
                tabSwitching = false;
            }, 380);

            // 更新标签状态
            document.querySelectorAll('.perm-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.perm-tab[data-tab="${tab}"]`).classList.add('active');

            lastTab = currentTab;
            currentTab = tab;

            // 只在对应标签页显示添加按钮，且只有admin账号可见
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
            const isAdmin = currentUser.id === 1;
            document.getElementById('addAdminBtn').style.display = (tab === 'admin' && isAdmin) ? '' : 'none';
            document.getElementById('addS6Btn').style.display = tab === 's6' ? '' : 'none';
        }

        // 初始化指示器位置
        function initTabIndicator() {
            const indicator = document.querySelector('.perm-tab-indicator');
            const activeTab = document.querySelector('.perm-tab.active');
            if (indicator && activeTab) {
                const tabRect = activeTab.getBoundingClientRect();
                const containerRect = activeTab.parentElement.getBoundingClientRect();
                // indicator初始left是6px，需要减去这个偏移
                const left = tabRect.left - containerRect.left - 6;
                indicator.style.transform = `translateX(${left}px)`;
                indicator.style.width = `${tabRect.width}px`;
            }
        }

        async function loadAllData() {
            await Promise.all([
                loadAdmins(),
                loadExamPerms(),
                loadGuestMealPerms(),
                loadS6Perms(),
                loadFilePublicPerms(),
                loadFilePersonalPerms()
            ]);
        }

        // ============ 管理员管理 ============
        async function loadAdmins() {
            try {
                const res = await fetch(`${API_URL}/admin/list`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.code === 0) {
                    admins = data.data || [];
                    renderAdminList();
                }
            } catch (err) { console.error('加载管理员失败:', err); }
        }

        function renderAdminList() {
            const list = document.getElementById('adminList');
            if (admins.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无管理员</div>'; return;
            }
            const systems = [
                { key: 'can_manage_staff', label: '员工' },
                { key: 'can_manage_training', label: '培训' },
                { key: 'can_manage_meal', label: '报餐' },
                { key: 'can_manage_voting', label: '投票' },
                { key: 'can_manage_6s', label: '6S' },
                { key: 'can_manage_permission', label: '权限' },
                { key: 'can_manage_file', label: '文件' }
            ];
            list.innerHTML = admins.map(admin => `
                <div class="admin-item">
                    <div class="admin-item-top">
                        <div class="admin-info">
                            <div class="admin-avatar">${(admin.nickname || '管').charAt(0)}</div>
                            <div>
                                <div class="admin-name">${admin.nickname || admin.username}</div>
                                <div class="admin-meta">工号: ${admin.username}</div>
                            </div>
                        </div>
                        <div class="admin-actions" ${admin.id === 1 ? 'style="display:none"' : ''}>
                            <button class="btn btn-secondary btn-sm" onclick="editAdmin(${admin.id})">编辑</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteAdmin(${admin.id})" ${admin.id === 1 ? 'disabled' : ''}>删除</button>
                        </div>
                    </div>
                    <div class="admin-systems">
                        ${systems.map(s => `
                            <span class="sys-tag ${admin[s.key] ? 'on' : 'off'}">
                                ${admin[s.key] ? '✓' : '○'} ${s.label}
                            </span>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function showAddAdminModal() {
            document.getElementById('adminId').value = '';
            document.getElementById('adminModalTitle').textContent = '添加管理员';
            document.getElementById('adminEmployeeId').value = '';
            document.getElementById('adminEmployeeId').disabled = false;
            document.getElementById('adminName').value = '';
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminPassword').required = true;
            document.getElementById('passwordHint').style.display = '';
            document.getElementById('passwordGroup').style.display = '';
            // 清空权限复选框
            document.getElementById('permStaff').checked = false;
            document.getElementById('permTraining').checked = false;
            document.getElementById('permMeal').checked = false;
            document.getElementById('permVoting').checked = false;
            document.getElementById('perm6s').checked = false;
            document.getElementById('permPermission').checked = false;
            document.getElementById('permFile').checked = false;
            document.getElementById('adminModal').classList.add('active');
        }

        function editAdmin(id) {
            const admin = admins.find(a => a.id === id);
            if (!admin) return;
            document.getElementById('adminId').value = admin.id;
            document.getElementById('adminModalTitle').textContent = '编辑管理员';
            document.getElementById('adminEmployeeId').value = admin.username;
            document.getElementById('adminEmployeeId').disabled = true;
            document.getElementById('adminName').value = admin.nickname || '';
            document.getElementById('adminPassword').value = '';
            document.getElementById('adminPassword').required = false;
            document.getElementById('passwordHint').style.display = 'none';
            document.getElementById('passwordGroup').style.display = 'none';
            // 设置权限复选框
            document.getElementById('permStaff').checked = admin.can_manage_staff == 1;
            document.getElementById('permTraining').checked = admin.can_manage_training == 1;
            document.getElementById('permMeal').checked = admin.can_manage_meal == 1;
            document.getElementById('permVoting').checked = admin.can_manage_voting == 1;
            document.getElementById('perm6s').checked = admin.can_manage_6s == 1;
            document.getElementById('permPermission').checked = admin.can_manage_permission == 1;
            document.getElementById('permFile').checked = admin.can_manage_file == 1;
            document.getElementById('adminModal').classList.add('active');
        }

        function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); }

        async function handleAdminSave(e) {
            e.preventDefault();
            const id = document.getElementById('adminId').value;
            const empId = document.getElementById('adminEmployeeId').value;
            const data = id ? {
                can_manage_staff: document.getElementById('permStaff').checked ? 1 : 0,
                can_manage_training: document.getElementById('permTraining').checked ? 1 : 0,
                can_manage_meal: document.getElementById('permMeal').checked ? 1 : 0,
                can_manage_voting: document.getElementById('permVoting').checked ? 1 : 0,
                can_manage_6s: document.getElementById('perm6s').checked ? 1 : 0,
                can_manage_permission: document.getElementById('permPermission').checked ? 1 : 0,
                can_manage_file: document.getElementById('permFile').checked ? 1 : 0
            } : {
                username: empId,
                nickname: document.getElementById('adminName').value,
                can_manage_staff: document.getElementById('permStaff').checked ? 1 : 0,
                can_manage_training: document.getElementById('permTraining').checked ? 1 : 0,
                can_manage_meal: document.getElementById('permMeal').checked ? 1 : 0,
                can_manage_voting: document.getElementById('permVoting').checked ? 1 : 0,
                can_manage_6s: document.getElementById('perm6s').checked ? 1 : 0,
                can_manage_permission: document.getElementById('permPermission').checked ? 1 : 0,
                can_manage_file: document.getElementById('permFile').checked ? 1 : 0,
                password: document.getElementById('adminPassword').value
            };
            const btn = document.getElementById('adminSaveBtn');
            btn.textContent = '保存中...'; btn.disabled = true;
            try {
                const url = id ? `${API_URL}/admin/${id}/update` : `${API_URL}/admin/add`;
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, { method, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const resData = await res.json();
                if (resData.code === 0) {
                    logAction(id ? `编辑管理员 ${empId}` : `添加管理员 ${empId}`);
                    alert(id ? '更新成功' : '添加成功');
                    closeAdminModal();
                    loadAdmins();
                } else { logAction(resData.msg || '操作失败', 'fail'); alert(resData.msg || '操作失败'); }
            } catch (err) { logAction('网络错误', 'fail'); alert('操作失败'); }
            btn.textContent = '保存'; btn.disabled = false;
        }

        async function deleteAdmin(id) {
            if (!confirm('确定删除此管理员？')) return;
            const admin = admins.find(a => a.id === id);
            const adminName = admin?.nickname || admin?.username || id;
            try {
                const res = await fetch(`${API_URL}/admin/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.code === 0) { logAction(`删除管理员 ${adminName}`); alert('删除成功'); loadAdmins(); }
                else { logAction(`删除管理员失败：${data.msg || adminName}`, 'fail'); alert(data.msg || '删除失败'); }
            } catch (err) { logAction(`删除管理员失败：网络错误`, 'fail'); alert('删除失败'); }
        }

        // ============ 考试权限 ============
        async function loadExamPerms() {
            try {
                const res = await fetch(`${API_URL}/permissions/exams`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.code === 0) {
                    renderExamList(data.data);
                }
            } catch (err) { console.error('加载考试权限失败:', err); }
        }

        function renderExamList(exams) {
            const list = document.getElementById('examList');
            if (!exams || exams.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无考试</div>'; return;
            }
            list.innerHTML = exams.map(exam => `
                <div class="resource-item fade-item" onclick="openExamModal(${exam.id}, '${exam.title.replace(/'/g, "\\'")}')">
                    <div class="resource-header">
                        <div>
                            <div class="resource-title">${exam.title}</div>
                            <div class="resource-meta">时长: ${exam.duration}分钟 | 及格: ${exam.pass_score}分</div>
                        </div>
                        <div class="resource-right">
                            <span class="perm-count">${exam.perm_count || 0}人已授权</span>
                            <span class="resource-arrow">›</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function openExamModal(examId, examTitle) {
            currentExamId = examId;
            document.getElementById('examModalTitle').textContent = `考试权限: ${examTitle}`;
            document.getElementById('examStaffList').innerHTML = '<div class="loading">加载中...</div>';
            document.getElementById('examModal').classList.add('active');

            try {
                const res = await fetch(`${API_URL}/permissions/exams/${examId}/staff`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.code === 0) {
                    renderExamStaffList(data.data);
                }
            } catch (err) { document.getElementById('examStaffList').innerHTML = '<div class="empty-state">加载失败</div>'; }
        }

        function renderExamStaffList(staff) {
            allStaff = staff;
            const selected = staff.filter(s => s.has_perm == 1);
            const selectAll = selected.length === staff.length;

            let html = `
                <div class="select-all-row">
                    <input type="checkbox" id="selectAllExam" ${selectAll ? 'checked' : ''} onchange="toggleAllExam(this)">
                    <label for="selectAllExam">全选</label>
                    <span style="margin-left: auto; font-size: 12px; color: var(--text-secondary);">

        async function handleExamImport() {
            const text = document.getElementById('examImportData').value.trim();
            if (!text) { alert('请粘贴数据'); return; }
            const lines = text.split('\n').filter(l => l.trim());
            const data = [];
            for (let i = 0; i < lines.length; i++) {
                const parts = lines[i].split(',').map(p => p.trim());
                if (parts.length >= 1 && parts[0]) {
                    data.push({ employee_id: parts[0], name: parts[1] || '' });
                }
            }
            if (data.length === 0) {
                logAction('导入失败：没有有效数据', 'fail');
                document.getElementById('examImportResult').className = 'import-result error';
                document.getElementById('examImportResult').textContent = '没有有效数据';
                return;
            }
            try {
                const res = await fetch(`${API_URL}/permissions/exams/batch`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data })
                });
                const resData = await res.json();
                if (resData.code === 0) {
                    const d = resData.data;
                    let msg = `成功 ${d.success} 条`;
                    if (d.fail > 0) {
                        msg += `，失败 ${d.fail} 条`;
                        logAction(`批量导入：${msg}`, 'fail');
                        if (d.errors && d.errors.length > 0) {
                            msg += `\n错误列表：\n` + d.errors.map(e => `${e.employee_id || '(空)'}${e.name ? '(' + e.name + ')' : ''}: ${e.error}`).join('\n');
                        }
                    } else {
                        logAction(`批量导入：成功 ${d.success} 条`);
                    }
                    document.getElementById('examImportResult').className = d.fail > 0 ? 'import-result error' : 'import-result success';
                    document.getElementById('examImportResult').textContent = msg;
                    if (d.fail === 0) {
                        setTimeout(() => { closeExamImportModal(); loadExamPerms(); }, 1500);
                    }
                } else {
                    logAction(resData.msg || '导入失败', 'fail');
                    document.getElementById('examImportResult').className = 'import-result error';
                    document.getElementById('examImportResult').textContent = resData.msg || '导入失败';
                }
            } catch (err) {
                logAction('网络错误', 'fail');
                document.getElementById('examImportResult').className = 'import-result error';
                document.getElementById('examImportResult').textContent = '导入失败';
            }
        }

        function filterGuestMealStaff() {
            const nameKeyword = document.getElementById('searchGuestMealKeyword').value.toLowerCase();

            const permFilter = document.getElementById('searchGuestMealPerm').value;

                const matchName = nameKeyword === '' || (s.name && s.name.toLowerCase().includes(nameKeyword)) || (s.name_pinyin && s.name_pinyin.toLowerCase().includes(nameKeyword));
                const matchEmpId = empIdKeyword === '' || (s.employee_id && s.employee_id.toLowerCase().includes(empIdKeyword));
                const matchDept = mealPermSelectedDepts.length === 0 || mealPermSelectedDepts.includes(dept);
                const hasPerm = s.guest_meal_permission == 1;
                const matchPerm = permFilter === '' || (permFilter === 'has' && hasPerm) || (permFilter === 'no' && !hasPerm);
                return matchName && matchEmpId && matchDept && matchPerm;
            });
            renderGuestMealList(filtered);

            document.querySelectorAll('.guest-meal-check').forEach(c => {
                const staffId = parseInt(c.value);
                const staff = allGuestMealStaff.find(s => s.id === staffId);
                if (staff) {
                    const dept = staff.department || '未分组';
                    if (!deptMap[dept]) deptMap[dept] = { total: 0, checked: 0 };
                    deptMap[dept].total++;
                    if (c.checked) deptMap[dept].checked++;

                const cb = document.getElementById(`selectAllGuestMeal_${dept.replace(/\s/g, '_').replace(/"/g, '&quot;')}`);

            const employeeId = document.getElementById('s6EmployeeId').value.trim();
            const employeeName = document.getElementById('s6EmployeeName').value.trim();
            const employeeNameEl = document.getElementById('s6EmployeeName');
            if (!employeeId) {

                return;
            }
            try {
                // 先查找员工
                const searchRes = await fetch(`${API_URL}/staff?search=${encodeURIComponent(employeeId)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const searchData = await searchRes.json();
                if (searchData.code !== 0 || !searchData.data || searchData.data.length === 0) {
                    logAction(`添加6S权限失败：员工不存在`, 'fail');
                    alert('员工不存在');
                    return;
                }
                const matched = searchData.data.find(s => s.employee_id === employeeId);
                const staff = matched || searchData.data[0];

                // 显示匹配的姓名
                employeeNameEl.value = staff.name || '';

                const staffId = staff.id;

                if (allS6Staff.find(s => s.id === staffId && s.has_perm == 1)) {
                    logAction(`添加6S权限失败：${actualName}已有权限`, 'fail');

                // 使用 POST /permissions/s6 添加单个员工6S权限
                const res = await fetch(`${API_URL}/permissions/s6`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ staff_id: staffId })
                });
                const data = await res.json();

        async function deleteS6Perm(staffId) {
            if (!confirm('确定删除该员工的6S权限？')) return;
            const staff = allS6Staff.find(s => s.id === staffId);
            const staffName = staff?.name || staff?.employee_id || staffId;
            try {
                // Get all staff IDs except the one to delete
                const currentIds = allS6Staff.filter(s => s.has_perm == 1).map(s => s.id);
                const newIds = currentIds.filter(id => id !== staffId);
                const res = await fetch(`${API_URL}/permissions/s6`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ staff_ids: newIds })
                });
                const data = await res.json();
                if (data.code === 0) {
                    logAction(`删除6S权限：${staffName}`);
                    alert('删除成功');
                    loadS6Perms();
                } else {
                    logAction(`删除6S权限失败：${data.msg || staffName}`, 'fail');
                    alert(data.msg || '删除失败');
                }
            } catch (err) {
                logAction(`删除6S权限失败：网络错误`, 'fail');
                alert('删除失败');
            }
        }

        async function handleFilePublicImport() {
            const text = document.getElementById('filePublicImportData').value.trim();
            if (!text) { alert('请粘贴数据'); return; }
            const lines = text.split('\n').filter(l => l.trim());
            const permissions = [];
            for (let i = 0; i < lines.length; i++) {
                const parts = lines[i].split(',').map(p => p.trim());
                if (parts.length >= 5) {
                    permissions.push({
                        employee_id: parts[0],
                        name: parts[1] || '',
                        can_read: parts[2] === '1' ? 1 : 0,
                        can_write: parts[3] === '1' ? 1 : 0,
                        can_download: parts[4] === '1' ? 1 : 0
                    });
                }
            }
            if (permissions.length === 0) {
                logAction('批量导入公共文件权限失败：没有有效数据', 'fail');
                document.getElementById('filePublicImportResult').className = 'import-result error';
                document.getElementById('filePublicImportResult').textContent = '没有有效数据';
                return;
            }
            try {
                const res = await fetch(`${API_URL}/permissions/files/public/batch`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ permissions })
                });
                const resData = await res.json();
                if (resData.code === 0) {
                    const d = resData.data;
                    let msg = `成功 ${d.success} 条`;
                    if (d.fail > 0) {
                        msg += `，失败 ${d.fail} 条`;
                        logAction(`批量导入公共文件权限：${msg}`, 'fail');
                        if (d.errors && d.errors.length > 0) {
                            msg += `\n错误列表：\n` + d.errors.map(e => `${e.employee_id || '(空)'}${e.name ? '(' + e.name + ')' : ''}: ${e.error}`).join('\n');
                        }
                    } else {
                        logAction(`批量导入公共文件权限：成功 ${d.success} 条`);
                    }
                    document.getElementById('filePublicImportResult').className = d.fail > 0 ? 'import-result error' : 'import-result success';
                    document.getElementById('filePublicImportResult').textContent = msg;
                    if (d.fail === 0) {
                        setTimeout(() => { closeFilePublicImportModal(); loadFilePublicPerms(); }, 1500);
                    }
                } else {
                    logAction(`批量导入公共文件权限失败：${resData.msg || ''}`, 'fail');
                    document.getElementById('filePublicImportResult').className = 'import-result error';
                    document.getElementById('filePublicImportResult').textContent = resData.msg || '导入失败';
                }
            } catch (err) {
                logAction('批量导入公共文件权限失败：网络错误', 'fail');
                document.getElementById('filePublicImportResult').className = 'import-result error';
                document.getElementById('filePublicImportResult').textContent = '导入失败';
            }
        }

        // ============ 工具函数 ============
        function downloadXLSX(data, filename) {
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
            XLSX.writeFile(wb, filename);
        }

        // ============ 文件上传处理 ============
        function downloadExamTemplate() {
            const data = [['工号', '姓名'], ['A001', '张三'], ['A002', '李四'], ['A003', '王五']];
            downloadXLSX(data, '考试权限导入模板.xlsx');
        }

        function parseXLSX(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const json = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                        resolve(json);
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = e => reject(e);
                reader.readAsArrayBuffer(file);
            });
        }

        async function handleExamFileUpload(input) {
            const file = input.files[0];
            if (!file) return;
            try {
                const data = await parseXLSX(file);
                // 转换为 CSV 格式文本
                const text = data.map(row => row.join(',')).join('\n');
                document.getElementById('examImportData').value = text;
            } catch (err) {
                alert('解析文件失败');
