<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务详情 - 兴利汽车模具</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .info-label { font-weight: bold; color: #666; }
        .info-value { color: #333; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-exam { background-color: #e3f2fd; color: #1976d2; }
        .badge-meal { background-color: #fff3e0; color: #f57c00; }
        .badge-pending { background-color: #fff3e0; color: #f57c00; }
        .badge-in_progress { background-color: #e3f2fd; color: #1976d2; }
        .badge-completed { background-color: #e8f5e9; color: #388e3c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✓ 任务详情</h1>
            <button class="btn btn-secondary" onclick="goBack()">← 返回</button>
        </div>

        <div id="loading" class="loading">
            <p>加载中...</p>
        </div>

        <div id="content" style="display: none;">
            <!-- 基本信息 -->
            <div class="card">
                <div class="card-title">📋 基本信息</div>
                <div class="info-row">
                    <span class="info-label">任务标题:</span>
                    <span class="info-value" id="taskTitle">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">任务类型:</span>
                    <span class="info-value">
                        <span class="badge" id="taskTypeBadge">-</span>
                    </span>
                </div>
                <div class="info-row">
                    <span class="info-label">任务状态:</span>
                    <span class="info-value">
                        <span class="badge" id="taskStatusBadge">-</span>
                    </span>
                </div>
                <div class="info-row">
                    <span class="info-label">优先级:</span>
                    <span class="info-value" id="taskPriority">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">截止日期:</span>
                    <span class="info-value" id="taskDueDate">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">创建时间:</span>
                    <span class="info-value" id="taskCreatedAt">-</span>
                </div>
            </div>

            <!-- 任务描述 -->
            <div class="card">
                <div class="card-title">📝 任务描述</div>
                <p id="taskDescription" style="color: #666; line-height: 1.6;">-</p>
            </div>

            <!-- 操作 -->
            <div class="card">
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="editTask()">✏️ 编辑</button>
                    <button class="btn btn-success" id="completeBtn" onclick="completeTask()">✓ 完成任务</button>
                    <button class="btn btn-secondary" onclick="deleteTask()">🗑️ 删除</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let token = localStorage.getItem('token');
        const taskId = new URLSearchParams(window.location.search).get('id');

        document.addEventListener('DOMContentLoaded', () => {
            if (!token || !taskId) {
                window.location.href = 'dashboard.html';
                return;
            }
            loadTaskDetail();
        });

        function loadTaskDetail() {
            fetch(`${API_URL}/task/${taskId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) {
                    const task = data.data;
                    document.getElementById('taskTitle').textContent = task.title;
                    document.getElementById('taskDescription').textContent = task.description || '暂无描述';
                    document.getElementById('taskPriority').textContent = task.priority === 'high' ? '高' : task.priority === 'medium' ? '中' : '低';
                    document.getElementById('taskDueDate').textContent = task.due_date || '未设置';
                    document.getElementById('taskCreatedAt').textContent = new Date(task.created_at).toLocaleDateString('zh-CN');

                    // 类型徽章
                    const typeBadge = document.getElementById('taskTypeBadge');
                    typeBadge.textContent = task.type === 'exam' ? '考试任务' : '报餐任务';
                    typeBadge.className = `badge badge-${task.type}`;

                    // 状态徽章
                    const statusBadge = document.getElementById('taskStatusBadge');
                    statusBadge.textContent = task.status === 'pending' ? '待处理' : task.status === 'in_progress' ? '进行中' : '已完成';
                    statusBadge.className = `badge badge-${task.status}`;

                    // 如果已完成，隐藏完成按钮
                    if (task.status === 'completed') {
                        document.getElementById('completeBtn').style.display = 'none';
                    }

                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                } else {
                    alert(data.msg);
                }
            })
            .catch(err => alert('加载失败: ' + err.message));
        }

        function editTask() {
            alert('编辑功能待开发');
        }

        function completeTask() {
            if (!confirm('确定要完成此任务吗？')) return;

            fetch(`${API_URL}/task/${taskId}/complete`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) {
                    alert('任务已完成');
                    loadTaskDetail();
                } else {
                    alert(data.msg);
                }
            })
            .catch(err => alert('操作失败: ' + err.message));
        }

        function deleteTask() {
            if (!confirm('确定要删除此任务吗？')) return;

            fetch(`${API_URL}/task/${taskId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) {
                    alert('任务已删除');
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.msg);
                }
            })
            .catch(err => alert('删除失败: ' + err.message));
        }

        function goBack() {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
