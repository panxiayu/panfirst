<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>在线考试 - 兴利汽车模具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --ios-bg: #f2f2f7;
            --ios-card: rgba(255,255,255,0.9);
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-radius: 16px;
            --ios-shadow: 0 3px 10px rgba(0, 0, 0, 0.06);
            --transition: 0.3s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
            background: var(--ios-bg);
            color: #1c1c1e;
            padding-bottom: 80px;
            padding-top: 20px;
        }




        .timer {
            font-size: 15px;
            font-weight: 600;
            color: var(--ios-blue);
        }

        .timer.warning { color: #ff9500; }
        .timer.danger { color: #ff3b30; }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .ios-card {
            background: var(--ios-card);
            border-radius: var(--ios-radius);
            padding: 20px 24px;
            margin-bottom: 12px;
            box-shadow: var(--ios-shadow);
        }

        .question-type {
            font-size: 13px;
            color: var(--ios-gray);
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.8);
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .option-item:last-child { margin-bottom: 0; }
        .option-item:active { transform: scale(0.98); }
        .option-item.selected {
            background: rgba(0,122,255,0.08);
            border-color: var(--ios-blue);
        }

        .option-radio, .option-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--ios-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .option-radio { border-radius: 50%; }
        .option-checkbox { border-radius: 6px; }
        .option-radio.checked, .option-checkbox.checked {
            background: var(--ios-blue);
            border-color: var(--ios-blue);
            color: white;
        }

        .option-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--ios-gray);
            width: 20px;
            text-align: center;
        }

        .option-text {
            flex: 1;
            font-size: 15px;
            font-weight: 500;
        }

        .ios-btn {
            display: block;
            width: 100%;
            text-align: center;
            padding: 14px;
            background: var(--ios-blue);
            color: #fff;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }
        .ios-btn:active { transform: scale(0.97); opacity: 0.9; }
        .ios-btn:disabled { background: var(--ios-gray); cursor: not-allowed; }

        .ios-btn-secondary { background: rgba(0,122,255,0.1); color: var(--ios-blue); }
        .ios-btn-danger { background: #ff3b30; }

        .bottom-nav {
            display: flex;
            gap: 10px;
            margin: 20px 16px 0;
        }
        .bottom-nav .ios-btn { flex: 1; }

        .answer-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(40px);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        .answer-sheet.show { transform: translateY(0); }

        .answer-sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .answer-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .answer-dot {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .answer-dot.current { background: var(--ios-blue); color: white; }
        .answer-dot.answered { background: rgba(0,122,255,0.15); color: var(--ios-blue); }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--ios-gray);
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--ios-blue);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: var(--ios-blue);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 10000;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <span id="examTitle" style="font-size:17px;font-weight:600;">考试</span>
            <span class="timer" id="timer" style="font-size:15px;font-weight:600;color:var(--ios-blue);">--:--</span>
        </div>
        <div id="loading" class="loading" style="display: none;">加载中...</div>
        <div id="questionArea" style="display: none;"></div>
    </div>

    <div class="bottom-nav" id="navArea" style="display: none;">
        <button class="ios-btn ios-btn-secondary" id="prevBtn" onclick="prevQuestion()">上一题</button>
        <button class="ios-btn" id="nextBtn" onclick="nextQuestion()">下一题</button>
        <button class="ios-btn ios-btn-danger" id="submitBtn" onclick="showSubmitConfirm()">交卷</button>
    </div>

    <div class="answer-sheet" id="answerSheet">
        <div class="answer-sheet-header">
            <span>答题卡</span>
            <div class="back-btn" onclick="hideAnswerSheet()">×</div>
        </div>
        <div class="answer-grid" id="answerGrid"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API = window.location.origin + '/api';
        let token = localStorage.getItem('employee_token');
        let examData = null;
        let currentIndex = 0;
        let answers = {};
        let timerInterval = null;
        let remainingSeconds = 0;
        let answerId = null;

        function getExamId() {
            return new URLSearchParams(window.location.search).get('id');
        }

        function goBack() {
            if (confirm('确定要退出考试吗？答题进度将不会保存。')) {
                window.location.href = 'mobile-training-list.html';
            }
        }

        async function loadExam() {
            const examId = getExamId();
            if (!examId) { goBack(); return; }

            try {
                const res = await fetch(API + '/exam/' + examId, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();

                if (data.code === 0) {
                    examData = data.data;
                } else {
                    showToast(data.msg || '加载失败');
                    setTimeout(() => goBack(), 2000);
                    return;
                }

                try {
                    const startRes = await fetch(API + '/exam/start', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ examId: examId })
                    }).then(r => r.json());

                    if (startRes.code === 0) {
                        answerId = startRes.data.answerId;
                    } else {
                        showToast(startRes.msg || '开始考试失败');
                        setTimeout(() => goBack(), 2000);
                        return;
                    }
                } catch (e) {
                    showToast('开始考试失败');
                    setTimeout(() => goBack(), 2000);
                    return;
                }

                renderExam();
            } catch (err) {
                showToast('加载失败');
                setTimeout(() => goBack(), 2000);
            }
        }

        function renderExam() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('examTitle').textContent = examData.exam.title;
            document.getElementById('questionArea').style.display = '';
            document.getElementById('navArea').style.display = 'flex';

            remainingSeconds = examData.exam.duration * 60;
            startTimer();
            renderAnswerSheet();
            renderQuestion(0);
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                remainingSeconds--;
                updateTimerDisplay();
                if (remainingSeconds <= 0) {
                    clearInterval(timerInterval);
                    showToast('时间到，自动提交！');
                    setTimeout(() => submitExam(), 2000);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timer = document.getElementById('timer');
            const h = Math.floor(remainingSeconds / 3600);
            const m = Math.floor((remainingSeconds % 3600) / 60);
            const s = remainingSeconds % 60;
            timer.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            timer.classList.remove('warning', 'danger');
            if (remainingSeconds <= 60) timer.classList.add('danger');
            else if (remainingSeconds <= 300) timer.classList.add('warning');
        }

        function renderQuestion(index) {
            currentIndex = index;
            const q = examData.questions[index];
            const typeMap = { 'single_choice': '单选题', 'multiple_choice': '多选题', 'true_false': '判断题' };

            let optionsHtml = '';
            if (q.type === 'true_false') {
                optionsHtml = ['√', '×'].map((opt) => `
                    <div class="option-item ${answers[q._id] == opt ? 'selected' : ''}" onclick="selectJudge('${opt}')">
                        <div class="option-radio ${answers[q._id] == opt ? 'checked' : ''}">${answers[q._id] == opt ? '✓' : ''}</div>
                        <span class="option-text">${opt === '√' ? '正确' : '错误'}</span>
                    </div>
                `).join('');
            } else if (q.type === 'multiple_choice') {
                optionsHtml = q.options.map((opt, i) => {
                    const letter = String.fromCharCode(65 + i);
                    const selected = answers[q._id] && answers[q._id].includes(letter);
                    return `
                        <div class="option-item ${selected ? 'selected' : ''}" onclick="toggleMultiOption(${i})">
                            <div class="option-checkbox ${selected ? 'checked' : ''}">${selected ? '✓' : ''}</div>
                            <span class="option-label">${letter}</span>
                            <span class="option-text">${opt}</span>
                        </div>
                    `;
                }).join('');
            } else {
                optionsHtml = q.options.map((opt, i) => {
                    const letter = String.fromCharCode(65 + i);
                    return `
                        <div class="option-item ${answers[q._id] == letter ? 'selected' : ''}" onclick="selectOption(${i})">
                            <div class="option-radio ${answers[q._id] == letter ? 'checked' : ''}">${answers[q._id] == letter ? '✓' : ''}</div>
                            <span class="option-label">${letter}</span>
                            <span class="option-text">${opt}</span>
                        </div>
                    `;
                }).join('');
            }

            document.getElementById('questionArea').innerHTML = `
                <div class="ios-card">
                    <div class="question-type">${typeMap[q.type] || '题目'}</div>
                    <div class="question-text">${q.content}</div>
                    <div style="margin-bottom: 16px;">${optionsHtml}</div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 13px; color: var(--ios-gray);">${index + 1} / ${examData.questions.length}</span>
                        <span style="font-size: 13px; color: var(--ios-blue);" onclick="showAnswerSheet()">答题卡</span>
                    </div>
                </div>
            `;

            document.getElementById('prevBtn').style.display = index > 0 ? 'block' : 'none';
            document.getElementById('nextBtn').style.display = index < examData.questions.length - 1 ? 'block' : 'none';
            document.getElementById('submitBtn').style.display = index === examData.questions.length - 1 ? 'block' : 'none';
            updateAnswerSheet();
        }

        function selectOption(optionIndex) {
            const q = examData.questions[currentIndex];
            answers[q._id] = String.fromCharCode(65 + optionIndex);
            renderQuestion(currentIndex);
        }

        function selectJudge(answer) {
            const q = examData.questions[currentIndex];
            answers[q._id] = answer;
            renderQuestion(currentIndex);
        }

        function toggleMultiOption(optionIndex) {
            const q = examData.questions[currentIndex];
            if (!answers[q._id]) answers[q._id] = [];
            const letter = String.fromCharCode(65 + optionIndex);
            const idx = answers[q._id].indexOf(letter);
            if (idx > -1) answers[q._id].splice(idx, 1);
            else answers[q._id].push(letter);
            renderQuestion(currentIndex);
        }

        function prevQuestion() {
            if (currentIndex > 0) renderQuestion(currentIndex - 1);
        }

        function nextQuestion() {
            if (currentIndex < examData.questions.length - 1) renderQuestion(currentIndex + 1);
        }

        function renderAnswerSheet() {
            const grid = document.getElementById('answerGrid');
            grid.innerHTML = examData.questions.map((q, i) => `
                <div class="answer-dot" onclick="goToQuestion(${i})">${i + 1}</div>
            `).join('');
        }

        function updateAnswerSheet() {
            const dots = document.querySelectorAll('.answer-dot');
            dots.forEach((dot, i) => {
                dot.classList.remove('current', 'answered');
                if (i === currentIndex) dot.classList.add('current');
                const q = examData.questions[i];
                if (answers[q._id] !== undefined) dot.classList.add('answered');
            });
        }

        function goToQuestion(index) {
            hideAnswerSheet();
            renderQuestion(index);
        }

        function showAnswerSheet() {
            document.getElementById('answerSheet').classList.add('show');
        }

        function hideAnswerSheet() {
            document.getElementById('answerSheet').classList.remove('show');
        }

        function showSubmitConfirm() {
            const unanswered = examData.questions.filter(q => answers[q._id] === undefined).length;
            let msg = '确定要提交试卷吗？';
            if (unanswered > 0) msg += `\n还有 ${unanswered} 题未答。`;
            if (confirm(msg)) submitExam();
        }

        async function submitExam() {
            clearInterval(timerInterval);
            if (!answerId) {
                showToast('考试记录不存在，请重新开始');
                setTimeout(() => goBack(), 2000);
                return;
            }

            try {
                const responses = examData.questions.map(q => {
                    const answer = answers[q._id];
                    let userAnswer = '';
                    if (answer === undefined) userAnswer = '';
                    else if (Array.isArray(answer)) userAnswer = answer.sort().join(',');
                    else userAnswer = answer;
                    return { questionId: q._id, userAnswer: userAnswer };
                });

                const res = await fetch(API + '/exam/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ answerId: answerId, responses: responses })
                });
                const data = await res.json();

                if (data.code === 0) {
                    window.location.href = `mobile-result.html?examId=${examData.exam.id}&answerId=${answerId}`;
                } else {
                    showToast(data.msg || '提交失败');
                }
            } catch (err) {
                showToast('提交失败');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        loadExam();
    </script>
</body>
</html>
