<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考试管理 - 兴利汽车模具</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
        :root {
            --bg: #F0F7FF;
            --card: #ffffff;
            --border: #D6E9FF;
            --primary: #4A90E2;
            --secondary: #65B3FF;
            --accent: #22C58D;
            --text: #1D2B5A;
            --text-soft: #5B72A9;
            --radius: 22px;
            --transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 序列入场动画 */
        .fade-item {
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }
        .fade-in {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        /* 渐变按钮 */
        .btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border-radius: 14px;
            font-weight: 600;
            font-size: 13px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.15);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-sm {
            padding: 8px 14px;
            font-size: 12px;
            border-radius: 10px;
        }
        .btn-secondary {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.15);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #f87171);
        }
        .btn-success {
            background: linear-gradient(135deg, #22c55e, #4ade80);
        }

        /* 卡片样式 */
        .card, .task-card, .exam-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .card:hover, .task-card:hover, .exam-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(74, 144, 226, 0.12);
            border-color: var(--primary);
        }

        /* 输入框 */
        .form-control {
            padding: 12px 16px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            transition: var(--transition);
        }
        .form-control:focus {
            border-color: var(--primary);
            background: var(--card);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
        }

        /* Tab栏 */
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--bg);
            padding: 6px;
            border-radius: 16px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-soft);
            cursor: pointer;
            transition: var(--transition);
        }
        .tab-btn.active {
            background: var(--card);
            color: var(--primary);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.15);
        }

        /* 徽章 */
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-success { background: rgba(34,197,94,0.12); color: #22c55e; }
        .status-secondary { background: rgba(0,0,0,0.06); color: var(--text-soft); }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--text);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 10000;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1200px;">
        <div class="toolbar">
            <div class="toolbar-left">
                <span class="page-title">培训管理</span>
            </div>
            <div class="toolbar-right" id="toolbarButtons">
                <!-- 学习任务按钮 -->
                <span id="btnsTraining" style="display:none;inline-flex;gap:8px;">
                    <button class="btn btn-primary btn-sm" onclick="showCreateTaskModal()">+ 新建资料</button>
                </span>
                <!-- 考试列表按钮 -->
                <span id="btnsPapers">
                    <button class="btn btn-primary btn-sm" onclick="showCreateExamModal()">+ 新建培训</button>
                </span>
                <!-- 题库管理按钮 -->
                <span id="btnsQuestions" style="display:none;">
                    <button class="btn btn-primary btn-sm" onclick="showQuestionImport()">+ 导入题目</button>
                </span>
                <button class="btn btn-secondary btn-sm" onclick="location.href='dashboard.html'">返回</button>
            </div>
        </div>

        <div id="examList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/exam.js"></script>
</body>
</html>
