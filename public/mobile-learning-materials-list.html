<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>学习资料 - 兴利汽车模具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --ios-bg: #f2f2f7;
            --ios-card: rgba(255,255,255,0.9);
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-green: #34c759;
            --ios-orange: #ff9500;
            --ios-red: #ff3b30;
            --ios-radius: 16px;
            --ios-shadow: 0 3px 10px rgba(0, 0, 0, 0.06);
            --transition: 0.3s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
            background: var(--ios-bg);
            color: #1c1c1e;
            padding-bottom: 100px;
            padding-top: 20px;
        }

        .header {
            max-width: 480px;
            margin: 0 auto 16px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--ios-card);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--ios-shadow);
            font-size: 16px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            flex: 1;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--ios-gray);
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--ios-blue);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--ios-gray);
        }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-text { font-size: 15px; }

        .material-item {
            background: var(--ios-card);
            border-radius: var(--ios-radius);
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: var(--ios-shadow);
            cursor: pointer;
            transition: var(--transition);
        }

        .material-item:active { transform: scale(0.98); }
        .material-item.disabled { opacity: 0.5; cursor: not-allowed; }

        .material-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 12px;
        }

        .material-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--ios-blue), #58c8ff);
            color: white;
        }

        .material-info {
            flex: 1;
            min-width: 0;
        }

        .material-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .material-desc {
            font-size: 13px;
            color: var(--ios-gray);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .material-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        .material-time {
            font-size: 12px;
            color: var(--ios-gray);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-not-started { background: rgba(142,142,147,0.12); color: var(--ios-gray); }
        .status-in-progress { background: rgba(255,149,0,0.12); color: var(--ios-orange); }
        .status-completed { background: rgba(52,199,89,0.12); color: var(--ios-green); }
        .status-overdue { background: rgba(255,59,48,0.12); color: var(--ios-red); }

        .tabbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 76px;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
            border-top: 1px solid rgba(0,0,0,0.06);
            z-index: 999;
        }

        .tab-item {
            font-size: 12px;
            color: var(--ios-gray);
            text-align: center;
            transition: var(--transition);
            text-decoration: none;
        }
        .tab-item.active { color: var(--ios-blue); }
        .tab-icon { font-size: 24px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="header-title">学习资料</div>
    </div>

    <div class="container">
        <div id="loading" class="loading" style="display: none;">加载中...</div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">📚</div>
            <div class="empty-text">暂无学习资料</div>
        </div>
        <div id="materialList"></div>
    </div>

    <nav class="tabbar">
        <a class="tab-item active" href="employee.html">
            <span class="tab-icon">🏠</span>
            首页
        </a>
        <a class="tab-item" href="mobile-exam-list.html">
            <span class="tab-icon">📝</span>
            考试
        </a>
        <a class="tab-item" href="mobile-learning-materials-list.html">
            <span class="tab-icon">📚</span>
            学习
        </a>
    </nav>

    <script>
        const API = window.location.origin + '/api';
        let token = localStorage.getItem('employee_token');

        if (!token) {
            window.location.href = 'index.html';
        }

        function goBack() {
            window.location.href = 'employee.html';
        }

        async function loadMaterials() {
            try {
                document.getElementById('loading').style.display = '';

                const res = await fetch(API + '/learning-materials', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();

                document.getElementById('loading').style.display = 'none';

                if (data.code === 0 && data.data && data.data.length > 0) {
                    renderMaterials(data.data);
                } else {
                    document.getElementById('emptyState').style.display = '';
                }
            } catch (err) {
                document.getElementById('loading').textContent = '加载失败';
                console.error('加载学习资料失败:', err);
            }
        }

        function renderMaterials(materials) {
            const list = document.getElementById('materialList');
            const now = new Date();

            const html = materials.map(material => {
                const startTime = material.start_time ? new Date(material.start_time) : null;
                const endTime = material.end_time ? new Date(material.end_time) : null;

                let statusClass = 'status-not-started';
                let statusText = '未开始';
                let isDisabled = false;
                let timeClass = '';

                const progressPercent = material.progress_percent || 0;

                if (material.progress_status === 'completed' || progressPercent >= 100) {
                    statusClass = 'status-completed';
                    statusText = '已完成';
                } else if (material.progress_status === 'in_progress' || progressPercent > 0) {
                    statusClass = 'status-in-progress';
                    statusText = '进行中';
                } else if (endTime && endTime < now) {
                    statusClass = 'status-overdue';
                    statusText = '已过期';
                    timeClass = 'overdue';
                    isDisabled = true;
                } else if (startTime && startTime > now) {
                    statusClass = 'status-not-started';
                    statusText = '未开始';
                    isDisabled = true;
                }

                let timeStr = '';
                if (startTime) timeStr = formatDate(startTime);
                if (endTime) timeStr += ' - ' + formatDate(endTime);
                if (!startTime && !endTime) timeStr = '无时间限制';

                const hasVideo = !!material.file_url;

                return `
                    <div class="material-item ${isDisabled ? 'disabled' : ''}" onclick="${isDisabled ? '' : 'goToMaterial(' + material.id + ')'}">
                        <div class="material-header">
                            <div class="material-icon">${hasVideo ? '🎬' : '📄'}</div>
                            <div class="material-info">
                                <div class="material-title">${material.title || '未命名资料'}</div>
                                ${material.description ? `<div class="material-desc">${material.description}</div>` : ''}
                            </div>
                        </div>
                        <div class="material-meta">
                            <span class="material-time">${timeStr}</span>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                    </div>
                `;
            }).join('');

            list.innerHTML = html;
        }

        function formatDate(date) {
            const d = new Date(date);
            return `${d.getMonth() + 1}月${d.getDate()}日`;
        }

        function goToMaterial(materialId) {
            window.location.href = 'mobile-learning-materials-detail.html?id=' + materialId;
        }

        loadMaterials();
    </script>
</body>
</html>
