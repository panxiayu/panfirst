<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳转中...</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; padding: 20px; box-sizing: border-box; }
        .container { background: white; color: #333; padding: 40px 30px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 400px; width: 100%; }
        h1 { margin: 0 0 20px 0; font-size: 24px; }
        p { margin: 0 0 30px 0; color: #666; line-height: 1.5; }
        .btn { display: inline-block; padding: 15px 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 18px; margin: 10px 5px; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.05); }
        .tips { margin-top: 30px; padding: 20px; background: #f5f5f5; border-radius: 10px; text-align: left; }
        .tips h3 { margin: 0 0 10px 0; font-size: 16px; }
        .tips ol { margin: 0; padding-left: 20px; font-size: 14px; color: #666; line-height: 1.8; }
        .url { word-break: break-all; background: #f0f0f0; padding: 10px 15px; border-radius: 8px; font-family: monospace; font-size: 14px; margin-bottom: 20px; color: #667eea; }
        .qr { margin: 20px 0; }
        .qr img { width: 200px; height: 200px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>即将打开系统</h1>
        <p>点击下方按钮跳转到系统浏览器</p>
        
        <div class="url">http://112.16.178.98/</div>

        <a href="http://112.16.178.98/" class="btn" id="openBtn">打开网页</a>
        
        <div class="tips">
            <h3>📱 如果按钮没反应，试试：</h3>
            <ol>
                <li><strong>安卓：</strong>微信里长按按钮 → 选择"在浏览器打开"</li>
                <li><strong>苹果：</strong>点击按钮后，下方会出现弹出框 → 选择"在Safari中打开"</li>
                <li><strong>或者：</strong>截图后在系统浏览器打开</li>
            </ol>
        </div>
        
        <div class="qr">
            <img src="qrcode.png" alt="QR Code">
            <p style="font-size:12px;color:#999;margin:10px 0 0 0;">微信扫码可直接打开</p>
        </div>
    </div>
    
    <script>
        // 检测iOS
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        
        // 点击按钮尝试跳转
        document.getElementById('openBtn').addEventListener('click', function(e) {
            if (isIOS) {
                // iOS会有提示选择"在Safari中打开"
                return;
            }
            // Android尝试直接跳转
            window.location.href = 'http://112.16.178.98/';
        });
    </script>
</body>
</html>
