<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <title>员工登录 - 兴利汽车模具</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
        :root {
            --bg: #F0F7FF;
            --card: #ffffff;
            --border: #D6E9FF;
            --primary: #4A90E2;
            --secondary: #65B3FF;
            --accent: #22C58D;
            --text: #1D2B5A;
            --text-soft: #5B72A9;
            --radius: 22px;
            --transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }
        body {
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 20px 16px;
        }

        /* 序列入场动画 */
        .fade-item {
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }
        .fade-in {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .login-box {
            background: var(--card);
            border-radius: var(--radius);
            padding: 40px 32px;
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--border);
            box-shadow: 0 18px 36px rgba(74, 144, 226, 0.12);
            transition: var(--transition);
        }
        .login-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px rgba(74, 144, 226, 0.15);
        }
        .logo {
            font-size: 56px;
            text-align: center;
            margin-bottom: 12px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            color: var(--text);
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 14px;
            color: var(--text-soft);
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        .form-control {
            width: 100%;
            padding: 16px 16px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            color: var(--text);
            transition: var(--transition);
            outline: none;
        }
        .form-control:focus {
            border-color: var(--primary);
            background: var(--card);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
        }
        .form-control::placeholder {
            color: var(--text-soft);
        }
        .form-control.name-input {
            background: var(--bg);
            cursor: not-allowed;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.25);
        }
        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(74, 144, 226, 0.3);
        }
        .login-btn:active {
            transform: scale(0.98);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .msg {
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 14px;
            margin-top: 16px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .msg-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        .admin-link {
            text-align: center;
            margin-top: 28px;
        }
        .admin-link a {
            font-size: 14px;
            color: var(--text-soft);
            text-decoration: none;
            padding: 8px 20px;
            display: inline-block;
            border-radius: 20px;
            transition: var(--transition);
        }
        .admin-link a:hover {
            color: var(--primary);
            background: var(--bg);
        }
        .hint {
            font-size: 12px;
            color: var(--text-soft);
            text-align: center;
            margin-top: 20px;
        }
        .name-hint {
            font-size: 12px;
            color: #dc2626;
            margin-top: 6px;
            display: none;
        }
        .name-hint.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box fade-item">
            <div class="logo">🏭</div>
            <div class="title">兴利汽车模具</div>
            <div class="subtitle">企业管理系统</div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">工号</label>
                    <input type="text" id="employeeId" class="form-control" placeholder="请输入工号" required autocomplete="off" inputmode="numeric" pattern="[0-9]*" oninput="onEmployeeIdInput()">
                </div>
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" id="name" class="form-control name-input" placeholder="输入工号后自动填充" readonly>
                    <div id="nameHint" class="name-hint">系统中未找到该工号</div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">登 录</button>
                <div id="msgError" class="msg msg-error"></div>
                <div id="msgSuccess" class="msg msg-success"></div>
            </form>

            <div class="admin-link">
                <a href="/admin/login.html">管理员登录</a>
            </div>

            <div class="hint">输入工号和姓名即可登录，无需密码</div>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';

        // 序列入场动画
        const items = document.querySelectorAll('.fade-item');
        items.forEach((el, i) => {
            setTimeout(() => el.classList.add('fade-in'), 150 * i);
        });

        let lookupTimer = null;

        function onEmployeeIdInput() {
            const hint = document.getElementById('nameHint');
            hint.classList.remove('show');
            const nameInput = document.getElementById('name');
            nameInput.value = '';
            nameInput.placeholder = '输入工号后自动填充';

            const id = document.getElementById('employeeId').value.trim();
            if (!id) {
                return;
            }

            clearTimeout(lookupTimer);
            lookupTimer = setTimeout(() => {
                lookupName(id);
            }, 500);
        }

        async function lookupName(id) {
            const nameInput = document.getElementById('name');
            const hint = document.getElementById('nameHint');

            try {
                const res = await fetch(API + '/auth/lookup?employee_id=' + encodeURIComponent(id));
                const data = await res.json();
                if (data.code === 0 && data.data && data.data.name) {
                    nameInput.value = data.data.name;
                    nameInput.placeholder = data.data.name;
                    hint.classList.remove('show');
                } else {
                    nameInput.value = '';
                    nameInput.placeholder = '系统中未找到该工号';
                    hint.classList.add('show');
                }
            } catch {
                nameInput.placeholder = '请输入姓名';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const employeeId = document.getElementById('employeeId').value.trim();
            const name = document.getElementById('name').value.trim();
            const btn = document.getElementById('loginBtn');
            const msgError = document.getElementById('msgError');
            const msgSuccess = document.getElementById('msgSuccess');

            msgError.style.display = 'none';
            msgSuccess.style.display = 'none';

            if (!employeeId) {
                msgError.textContent = '请输入工号';
                msgError.style.display = 'block';
                return;
            }

            if (!name) {
                msgError.textContent = '请输入姓名';
                msgError.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const res = await fetch(API + '/auth/employee-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employee_id: employeeId, name })
                });
                const data = await res.json();

                if (data.code === 0) {
                    msgSuccess.textContent = '登录成功，正在跳转...';
                    msgSuccess.style.display = 'block';
                    localStorage.setItem('employee_token', data.data.token);
                    localStorage.setItem('employee_info', JSON.stringify(data.data.staff));
                    setTimeout(() => { window.location.href = window.location.origin + '/employee.html'; }, 600);
                } else {
                    msgError.textContent = data.msg || '工号或姓名不匹配，无登录权限';
                    msgError.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = '登 录';
                }
            } catch (err) {
                msgError.textContent = '网络错误，请检查网络';
                msgError.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        }

        // 检查是否已登录
        if (localStorage.getItem('employee_token')) {
            window.location.href = window.location.origin + '/employee.html';
        }
    </script>
</body>
</html>
