<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>在线考试 - 兴利汽车模具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --ios-bg: #f2f2f7;
            --ios-card: rgba(255,255,255,0.9);
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-radius: 16px;
            --ios-shadow: 0 3px 10px rgba(0, 0, 0, 0.06);
            --transition: 0.3s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
            background: var(--ios-bg);
            color: #1c1c1e;
            padding-bottom: 80px;
            padding-top: 20px;
        }




        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .ios-card {
            background: var(--ios-card);
            border-radius: var(--ios-radius);
            padding: 20px 24px;
            margin-bottom: 12px;
            box-shadow: var(--ios-shadow);
            cursor: pointer;
            transition: var(--transition);
        }

        .ios-card:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .ios-card h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .ios-card p {
            font-size: 15px;
            color: var(--ios-gray);
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .card-meta {
            font-size: 13px;
            color: var(--ios-gray);
            margin-bottom: 10px;
        }

        .score-badge {
            display: inline-flex;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        .score-badge.pass { background: rgba(0,122,255,0.12); color: var(--ios-blue); }
        .score-badge.fail { background: rgba(255,59,48,0.12); color: #ff3b30; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 6px;
        }

        .status-success { background: rgba(0,122,255,0.12); color: var(--ios-blue); }
        .status-danger { background: rgba(255,59,48,0.12); color: #ff3b30; }
        .status-info { background: rgba(88,200,255,0.12); color: #58c8ff; }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--ios-gray);
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--ios-blue);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state, .error-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--ios-gray);
        }
        .empty-icon { font-size: 40px; margin-bottom: 12px; }

        .tabbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 76px;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
            border-top: 1px solid rgba(0,0,0,0.06);
            z-index: 999;
        }

        .tab-item {
            font-size: 12px;
            color: var(--ios-gray);
            text-align: center;
            transition: var(--transition);
        }
        .tab-item.active { color: var(--ios-blue); }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading" class="loading" style="display: none;">加载中...</div>
        <div id="errorState" class="error-state" style="display: none;">
            <div class="empty-icon">⚠️</div>
            <div id="errorMessage">您没有考试权限</div>
        </div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">📝</div>
            <div>暂无考试</div>
        </div>
        <div id="examList"></div>
    </div>

    <script>
        const API = window.location.origin + '/api';
        let token = localStorage.getItem('employee_token');

        if (!token) {
            window.location.href = 'index.html';
        }

        function goBack() {
            window.location.href = 'employee.html';
        }

        async function loadExams() {
            try {
                const res = await fetch(API + '/exam/list', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();

                document.getElementById('loading').style.display = 'none';

                if (data.code === -1) {
                    document.getElementById('errorState').style.display = '';
                    document.getElementById('errorMessage').textContent = data.msg || '您没有考试权限';
                    return;
                }

                if (data.code === 0 && data.data && data.data.length > 0) {
                    renderExams(data.data);
                } else {
                    document.getElementById('emptyState').style.display = '';
                }
            } catch (err) {
                document.getElementById('loading').textContent = '加载失败';
            }
        }

        function renderExams(exams) {
            const list = document.getElementById('examList');

            const html = exams.map(exam => {
                let statusClass = 'status-info';
                let statusText = '参加考试';

                if (exam.completed) {
                    if (exam.is_passed) {
                        statusClass = 'status-success';
                        statusText = '已通过';
                    } else {
                        statusClass = 'status-danger';
                        statusText = '未通过';
                    }
                }

                return `
                    <div class="ios-card" onclick="goToExam(${exam.id}, ${exam.completed})">
                        <h3>${exam.title}${exam.completed ? `<span class="score-badge ${exam.is_passed ? 'pass' : 'fail'}">${exam.last_score}分</span>` : ''}</h3>
                        <p>时长: ${exam.duration}分钟 | 及格分: ${exam.pass_score}分 | 总分: ${exam.total_score}分</p>
                        <span class="status-badge ${exam.completed ? (exam.is_passed ? 'status-success' : 'status-danger') : 'status-info'}">${statusText}</span>
                    </div>
                `;
            }).join('');

            list.innerHTML = html;
        }

        function goToExam(examId, completed) {
            if (completed) {
                window.location.href = 'mobile-result.html?examId=' + examId + '&readonly=1';
            } else {
                window.location.href = 'mobile-exam-doing.html?id=' + examId;
            }
        }

        loadExams();
    </script>
</body>
</html>
