<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <title>管理员登录 - 兴利汽车模具</title>
    <link rel="stylesheet"="../css/theme.css">
    <style>
        :root {
            --bg: #F0F7FF;
            --card: #ffffff;
            --border: #D6E9FF;
            --primary: #4A90E2;
            --secondary: #65B3FF;
            --accent: #22C58D;
            --text: #1D2B5A;
            --text-soft: #5B72A9;
            --radius: 22px;
            --transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }
        body {
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 20px 16px;
        }

        /* 序列入场动画 */
        .fade-item {
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }
        .fade-in {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .login-box {
            background: var(--card);
            border-radius: var(--radius);
            padding: 40px 32px;
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--border);
            box-shadow: 0 18px 36px rgba(74, 144, 226, 0.12);
            transition: var(--transition);
        }
        .login-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px rgba(74, 144, 226, 0.15);
        }
        .logo {
            font-size: 56px;
            text-align: center;
            margin-bottom: 12px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            color: var(--text);
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 14px;
            color: var(--text-soft);
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }
        .form-control {
            width: 100%;
            padding: 16px 16px;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            color: var(--text);
            transition: var(--transition);
            outline: none;
        }
        .form-control:focus {
            border-color: var(--primary);
            background: var(--card);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
        }
        .form-control::placeholder {
            color: var(--text-soft);
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.25);
        }
        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(74, 144, 226, 0.3);
        }
        .login-btn:active {
            transform: scale(0.98);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .msg {
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 14px;
            margin-top: 16px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .msg-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        .admin-link {
            text-align: center;
            margin-top: 28px;
        }
        .admin-link a {
            font-size: 14px;
            color: var(--text-soft);
            text-decoration: none;
            padding: 8px 20px;
            display: inline-block;
            border-radius: 20px;
            transition: var(--transition);
        }
        .admin-link a:hover {
            color: var(--primary);
            background: var(--bg);
        }
        .hint {
            font-size: 12px;
            color: var(--text-soft);
            text-align: center;
            margin-top: 20px;
        }
        .demo-info {
            background: linear-gradient(135deg, var(--bg), #E5F0FF);
            padding: 16px 18px;
            border-radius: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--text-soft);
            border: 1px solid var(--border);
        }
        .demo-info strong {
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box fade-item">
            <div class="logo">🏭</div>
            <div class="title">管理员登录</div>
            <div class="subtitle">兴利汽车模具</div>

            <div class="demo-info">
                <strong>演示账户:</strong> 用户名 admin / 密码 admin123
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" id="username" class="form-control" placeholder="请输入用户名" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="password" class="form-control" placeholder="请输入密码" required autocomplete="off">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">登 录</button>
                <div id="msgError" class="msg msg-error"></div>
                <div id="msgSuccess" class="msg msg-success"></div>
            </form>

            <div class="admin-link">
                <a href="/">返回首页</a>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';

        // 序列入场动画
        const items = document.querySelectorAll('.fade-item');
        items.forEach((el, i) => {
            setTimeout(() => el.classList.add('fade-in'), 150 * i);
        });

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msgError = document.getElementById('msgError');
            const msgSuccess = document.getElementById('msgSuccess');

            msgError.style.display = 'none';
            msgSuccess.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const res = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.code === 0) {
                    msgSuccess.textContent = '登录成功，正在跳转...';
                    msgSuccess.style.display = 'block';
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('currentUser', JSON.stringify(data.data.user));
                    setTimeout(() => { window.location.href = window.location.origin + '/dashboard.html'; }, 800);
                } else {
                    msgError.textContent = data.msg || '用户名或密码错误';
                    msgError.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = '登 录';
                }
            } catch (err) {
                msgError.textContent = '网络错误，请检查网络';
                msgError.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        }

        if (localStorage.getItem('token')) {
            window.location.href = window.location.origin + '/dashboard.html';
        }
    </script>
</body>
</html>
