<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <title>管理员登录 - 兴利汽车模具</title>
    <link rel="stylesheet" href="../css/theme.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(180deg, #f0f4ff 0%, #e8eeff 100%);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }
        body {
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 20px 16px;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.12);
        }
        .logo {
            font-size: 48px;
            text-align: center;
            margin-bottom: 8px;
        }
        .title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 13px;
            color: #6b7280;
            text-align: center;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-control {
            width: 100%;
            padding: 14px 14px;
            background: #f9fafb;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            color: #1a1a1a;
            transition: all 0.2s;
            outline: none;
        }
        .form-control:focus {
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .form-control::placeholder {
            color: #9ca3af;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.35);
        }
        .login-btn:active {
            transform: scale(0.98);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .msg {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .msg-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        .msg-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        .admin-link {
            text-align: center;
            margin-top: 20px;
        }
        .admin-link a {
            font-size: 13px;
            color: #6b7280;
            text-decoration: none;
            padding: 8px 16px;
            display: inline-block;
        }
        .admin-link a:active {
            color: #3b82f6;
        }
        .hint {
            font-size: 11px;
            color: #9ca3af;
            text-align: center;
            margin-top: 16px;
        }
        .demo-info {
            background: #f0f4ff;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #6b7280;
            border: 1px solid #e5e7eb;
        }
        .demo-info strong {
            color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">🏭</div>
            <div class="title">管理员登录</div>
            <div class="subtitle">兴利汽车模具</div>

            <div class="demo-info">
                <strong>演示账户:</strong> 用户名 admin / 密码 admin123
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" id="username" class="form-control" placeholder="请输入用户名" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="password" class="form-control" placeholder="请输入密码" required autocomplete="off">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">登录</button>
                <div id="msgError" class="msg msg-error"></div>
                <div id="msgSuccess" class="msg msg-success"></div>
            </form>

            <div class="admin-link">
                <a href="/">返回首页</a>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const msgError = document.getElementById('msgError');
            const msgSuccess = document.getElementById('msgSuccess');

            msgError.style.display = 'none';
            msgSuccess.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const res = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.code === 0) {
                    msgSuccess.textContent = '登录成功，正在跳转...';
                    msgSuccess.style.display = 'block';
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('currentUser', JSON.stringify(data.data.user));
                    setTimeout(() => { window.location.href = window.location.origin + '/dashboard.html'; }, 800);
                } else {
                    msgError.textContent = data.msg || '用户名或密码错误';
                    msgError.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = '登录';
                }
            } catch (err) {
                msgError.textContent = '网络错误，请检查网络';
                msgError.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        if (localStorage.getItem('token')) {
            window.location.href = window.location.origin + '/dashboard.html';
        }
    </script>
</body>
</html>
