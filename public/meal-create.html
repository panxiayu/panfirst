<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建报餐 - 兴利汽车模具</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, var(--bg) 0%, var(--bg) 50%, var(--bg) 100%); color: var(--text); min-height: 100vh; }
        .container { width: 100% !important; max-width: 800px !important; margin: 0 auto; padding: 20px 24px; box-sizing: border-box; overflow-x: auto; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; width: 100%; box-sizing: border-box; }
        .toolbar-left { display: flex; align-items: center; gap: 12px; }
        .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }

        .btn { padding: 8px 14px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%); color: white; box-shadow: 0 3px 10px rgba(59,130,246,0.3); }
        .btn-secondary { background: var(--white); color: var(--text); border: 1px solid var(--border); }

        .card { background: var(--white); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.6); margin-bottom: 16px; }
        .card-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px; }

        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; display: block; }
        .form-control { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--bg-input); color: var(--text); transition: all 0.2s; }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
        .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .meal-type-section { background: var(--bg-secondary); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
        .meal-type-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-weight: 600; font-size: 15px; }
        .toggle-switch { position: relative; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .3s; border-radius: 24px; }
        .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        .toggle-switch input:checked + .toggle-slider { background-color: #22c55e; }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(20px); }

        .time-row { display: flex; align-items: center; gap: 8px; }
        .time-row input { width: 120px; }
        .time-separator { color: var(--text-muted); }
        .time-disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn btn-secondary" onclick="location.href='meal-list.html'">← 返回</button>
                <span class="page-title">创建报餐</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">基本信息</div>
            <div class="form-group">
                <label class="form-label">报餐名称 *</label>
                <input type="text" class="form-control" id="title" placeholder="例如：4月份工作餐" required>
            </div>
            <div class="form-group">
                <label class="form-label">报餐日期范围 *</label>
                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="date" class="form-control" id="start_date" required>
                    <span>至</span>
                    <input type="date" class="form-control" id="end_date" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">报名截止时间 *</label>
                <input type="datetime-local" class="form-control" id="deadline" required>
                <div class="form-hint">超过截止时间后无法再报名</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">报餐时间段设置</div>
            <div class="form-hint" style="margin-bottom:16px">设置每天的中餐和晚餐报餐时间段，超出时间员工无法报名</div>

            <div class="meal-type-section" id="lunchSection">
                <div class="meal-type-header">
                    <span>🍱 中餐</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="lunch_enabled" checked onchange="toggleMeal('lunch', this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div id="lunchTimes" style="display:flex;gap:12px;flex-wrap:wrap;">
                    <div class="time-row">
                        <input type="time" class="form-control" id="lunch_signup_start" value="09:00">
                        <span class="time-separator">至</span>
                        <input type="time" class="form-control" id="lunch_signup_end" value="10:30">
                    </div>
                </div>
            </div>

            <div class="meal-type-section" id="dinnerSection">
                <div class="meal-type-header">
                    <span>🍚 晚餐</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="dinner_enabled" checked onchange="toggleMeal('dinner', this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div id="dinnerTimes" style="display:flex;gap:12px;flex-wrap:wrap;">
                    <div class="time-row">
                        <input type="time" class="form-control" id="dinner_signup_start" value="14:00">
                        <span class="time-separator">至</span>
                        <input type="time" class="form-control" id="dinner_signup_end" value="15:30">
                    </div>
                </div>
            </div>
        </div>

        <button class="btn btn-primary" onclick="submitForm()" style="width:100%;">创建报餐</button>
    </div>

    <script>
        // Redirect to meal-list.html which has the create modal embedded
        window.location.href = 'meal-list.html';
    </script>
</body>
</html>
