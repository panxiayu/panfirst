<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报餐统计 - 兴利汽车模具</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, var(--bg) 0%, var(--bg) 50%, var(--bg) 100%); color: var(--text); min-height: 100vh; }
        .container { width: 100% !important; max-width: 1600px !important; margin: 0 auto; padding: 20px 24px; box-sizing: border-box; overflow-x: auto; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; width: 100%; box-sizing: border-box; }
        .toolbar-left { display: flex; align-items: center; gap: 12px; }
        .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }

        .btn { padding: 8px 14px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: all 0.2s; }
        .btn-secondary { background: var(--white); color: var(--text); border: 1px solid var(--border); }

        .stats-grid { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 140px; background: var(--white); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.6); text-align: center; }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--text); }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

        .activity-info { margin-bottom: 20px; }
        .activity-meta { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

        .section-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

        .meal-type-section { margin-bottom: 24px; }
        .meal-type-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-weight: 600; font-size: 15px; }
        .meal-type-times { font-size: 13px; color: var(--text-secondary); font-weight: normal; }

        .person-card { background: var(--white); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 8px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.6); display: flex; justify-content: space-between; align-items: center; }
        .person-name { font-weight: 600; font-size: 14px; }
        .person-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .person-meals { display: flex; gap: 16px; font-size: 13px; }
        .meal-count { display: flex; align-items: center; gap: 4px; }

        .empty { text-align: center; padding: 40px; color: var(--text-secondary); }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn btn-secondary" onclick="location.href='meal-list.html'">← 返回</button>
                <span class="page-title" id="activityTitle">报餐统计</span>
            </div>
        </div>

        <div id="loading" class="loading">加载中...</div>
        <div id="empty" class="empty" style="display:none">暂无报名数据</div>
        <div id="content" style="display:none">
            <div class="activity-info">
                <p class="activity-meta" id="activityMeta"></p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalPeople">0</div>
                    <div class="stat-label">总人数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalEmployee">0</div>
                    <div class="stat-label">员工餐</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalGuest">0</div>
                    <div class="stat-label">客餐</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalMeals">0</div>
                    <div class="stat-label">总份数</div>
                </div>
            </div>

            <div id="signupSections"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const API_URL = window.location.origin + '/api';
        const params = new URLSearchParams(location.search);
        const activityId = params.get('id');
        let token = localStorage.getItem('adminToken') || localStorage.getItem('token');

        document.addEventListener('DOMContentLoaded', () => {
            if (!token) {
                window.location.href = 'admin/login.html';
                return;
            }
            if (!activityId) {
                alert('无效的活动ID');
                location.href = 'meal-list.html';
                return;
            }
            loadStatistics();
        });

        function loadStatistics() {
            document.getElementById('loading').style.display = 'block';
            fetch(`${API_URL}/meal/${activityId}/statistics`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                if (data.code === 0) {
                    renderStatistics(data.data);
                } else {
                    alert(data.msg || '加载失败');
                }
            })
            .catch(err => {
                document.getElementById('loading').style.display = 'none';
                alert('加载失败');
            });
        }

        function renderStatistics(data) {
            const a = data.activity;
            const s = data.statistics;

            document.getElementById('activityTitle').textContent = a.title;
            document.getElementById('activityMeta').textContent =
                `报餐日期：${a.start_date} ~ ${a.end_date} | 中餐 ${a.lunch_start}-${a.lunch_end} | 晚餐 ${a.dinner_start}-${a.dinner_end} | 截止：${a.deadline}`;

            document.getElementById('totalPeople').textContent = s.combined.people;
            document.getElementById('totalEmployee').textContent = s.combined.employee;
            document.getElementById('totalGuest').textContent = s.combined.guest;
            document.getElementById('totalMeals').textContent = s.combined.total;

            const sections = document.getElementById('signupSections');
            let html = '';

            if (data.signups.lunch.length > 0) {
                html += `
                <div class="meal-type-section">
                    <div class="meal-type-header">
                        🍱 中餐
                        <span class="meal-type-times">${a.lunch_start} - ${a.lunch_end} | 共 ${s.lunch.total} 份</span>
                    </div>
                    ${data.signups.lunch.map(su => `
                    <div class="person-card">
                        <div>
                            <div class="person-name">${su.nickname || su.username}</div>
                            <div class="person-meta">报名时间：${su.created_at}</div>
                        </div>
                        <div class="person-meals">
                            <span class="meal-count">员工: ${su.employee_count}</span>
                            <span class="meal-count">客: ${su.guest_count}</span>
                        </div>
                    </div>
                    `).join('')}
                </div>
                `;
            }

            if (data.signups.dinner.length > 0) {
                html += `
                <div class="meal-type-section">
                    <div class="meal-type-header">
                        🍚 晚餐
                        <span class="meal-type-times">${a.dinner_start} - ${a.dinner_end} | 共 ${s.dinner.total} 份</span>
                    </div>
                    ${data.signups.dinner.map(su => `
                    <div class="person-card">
                        <div>
                            <div class="person-name">${su.nickname || su.username}</div>
                            <div class="person-meta">报名时间：${su.created_at}</div>
                        </div>
                        <div class="person-meals">
                            <span class="meal-count">员工: ${su.employee_count}</span>
                            <span class="meal-count">客: ${su.guest_count}</span>
                        </div>
                    </div>
                    `).join('')}
                </div>
                `;
            }

            if (data.signups.lunch.length === 0 && data.signups.dinner.length === 0) {
                document.getElementById('empty').style.display = 'block';
            }

            sections.innerHTML = html;
            document.getElementById('content').style.display = 'block';
        }
    </script>
</body>
</html>
